<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Finanzio v8</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanzio" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1D9E75" />
  <meta name="description" content="Finanzio v8 — Gestión financiera personal" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:#1D9E75;  --green-soft:#E1F5EE;  --green-dark:#0F6E56;
      --red:#D85A30;    --red-soft:#FAECE7;    --red-dark:#993C1D;
      --amber:#BA7517;  --amber-soft:#FAEEDA;  --amber-dark:#854F0B;
      --blue:#185FA5;   --blue-soft:#E6F1FB;   --blue-dark:#0C447C;
      --purple:#534AB7; --purple-soft:#EEEDFE;
      --gray:#888780;   --gray-soft:#F1EFE8;
      --bg:#ffffff; --bg-soft:#f7f7f5; --bg-raised:#f2f2ef;
      --border:rgba(0,0,0,0.10); --border-med:rgba(0,0,0,0.18);
      --ink:#1a1a18; --muted:#6b6b68; --hint:#9b9b98;
      --font-body:'Outfit',system-ui,sans-serif;
      --font-display:'DM Serif Display',Georgia,serif;
      --font-mono:'DM Mono','Courier New',monospace;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
    }
    @media (prefers-color-scheme:dark) {
      :root {
        --bg:#141413; --bg-soft:#1c1c1a; --bg-raised:#242422;
        --border:rgba(255,255,255,0.09); --border-med:rgba(255,255,255,0.15);
        --ink:#f0f0ee; --muted:#8a8a87; --hint:#5a5a57;
      }
    }

    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg-soft);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #root { min-height: 100%; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 4px; }

    /* ── Animations ── */
    @keyframes slideUp   { from{transform:translateY(14px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
    @keyframes popIn     { from{transform:scale(.94);opacity:0} to{transform:scale(1);opacity:1} }

    /* ── Privacy blur ── */
    .privacy-blur { filter: blur(8px); user-select: none; transition: filter .25s; }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: calc(var(--safe-top) + 12px) 18px 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .topbar-logo { font-family: var(--font-display); font-size: 20px; color: var(--green); white-space: nowrap; }
    .topbar-logo em { color: var(--ink); font-style: italic; }
    .topbar-logo sup { font-family: var(--font-body); font-size: 9px; color: var(--muted); font-style: normal; margin-left: 3px; vertical-align: super; }
    .topbar-actions { display: flex; align-items: center; gap: 6px; }
    .topbar-icon-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 0.5px solid var(--border);
      background: var(--bg-soft); color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all .15s; font-family: var(--font-body);
    }
    .topbar-icon-btn:hover { border-color: var(--border-med); color: var(--ink); }
    .topbar-icon-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    /* ── Desktop tabs ── */
    .tab-nav { display:flex; gap:3px; background:var(--bg-soft); border:0.5px solid var(--border); border-radius:10px; padding:3px; }
    .tab-btn { padding:6px 13px; border:none; background:none; border-radius:7px; font-size:12px; font-weight:500; color:var(--muted); cursor:pointer; font-family:var(--font-body); transition:all .15s; white-space:nowrap; }
    .tab-btn.active { background:var(--bg); color:var(--ink); border:0.5px solid var(--border); }

    /* ── Month nav ── */
    .month-nav { display:flex; align-items:center; gap:5px; flex-shrink:0; }
    .month-btn { width:28px; height:28px; border:0.5px solid var(--border); border-radius:7px; background:none; color:var(--ink); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; font-family:var(--font-body); }
    .month-label { font-size:12px; font-weight:500; min-width:88px; text-align:center; white-space:nowrap; color:var(--ink); }

    /* ── Bottom nav (mobile) ── */
    .bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; z-index:50; background:var(--bg); border-top:0.5px solid var(--border); padding:6px 0 calc(var(--safe-bottom) + 6px); }
    .bottom-nav-inner { display:flex; justify-content:space-around; }
    .bnav-btn { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; padding:6px 12px; border-radius:10px; font-family:var(--font-body); color:var(--muted); font-size:10px; font-weight:500; transition:color .15s; -webkit-tap-highlight-color:transparent; }
    .bnav-btn.active { color:var(--green); }
    .bnav-btn svg { width:21px; height:21px; }

    /* ── Page body ── */
    .page-body { padding:18px 18px calc(84px + var(--safe-bottom)); max-width:1080px; margin:0 auto; }

    /* ── Grids ── */
    .kpi-grid   { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:16px; }
    .kpi-grid-3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-bottom:16px; }
    .kpi-grid-2 { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-bottom:16px; }
    .grid-2     { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }

    /* ── KCard ── */
    .kcard { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-md); padding:15px 17px; position:relative; overflow:hidden; animation:slideUp .3s ease both; }
    .kcard-accent { position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px 0 0 3px; }
    .kcard-label { font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin-bottom:6px; }
    .kcard-value { font-family:var(--font-mono); font-size:19px; font-weight:500; color:var(--ink); line-height:1.2; margin-bottom:4px; }
    .kcard-sub   { font-size:10px; color:var(--muted); margin-top:3px; line-height:1.4; }
    .kcard-delta { display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:500; padding:2px 7px; border-radius:20px; margin-top:4px; }

    /* ── Panel ── */
    .panel { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-md); overflow:hidden; margin-bottom:14px; animation:slideUp .3s ease both; }
    .panel-header { display:flex; align-items:center; justify-content:space-between; padding:12px 15px; border-bottom:0.5px solid var(--border); }
    .panel-title { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:500; color:var(--ink); }
    .panel-icon { width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }

    /* ── Row ── */
    .row { display:flex; align-items:center; padding:10px 15px; border-bottom:0.5px solid var(--border); gap:9px; transition:background .1s; }
    .row:last-child { border-bottom:none; }
    .row-overdue { background:rgba(186,117,23,.07); }
    .row-info { flex:1; min-width:0; }
    .row-name { font-size:12px; font-weight:500; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .row-sub  { font-size:10px; color:var(--muted); margin-top:1px; }
    .row-amount { font-family:var(--font-mono); font-size:12px; font-weight:500; color:var(--ink); white-space:nowrap; }

    /* ── Tag ── */
    .tag { font-size:9px; font-weight:500; padding:2px 7px; border-radius:20px; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; flex-shrink:0; }

    /* ── Progress bar ── */
    .pbar-wrap { height:4px; background:var(--bg-soft); border-radius:2px; overflow:hidden; margin-top:4px; }
    .pbar-fill { height:100%; border-radius:2px; transition:width .5s ease; }

    /* ── Dot ── */
    .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; display:inline-block; }

    /* ── Savings bar ── */
    .sbar-track { height:12px; background:var(--bg-soft); border-radius:6px; overflow:hidden; position:relative; }
    .sbar-seg   { position:absolute; top:0; bottom:0; transition:width .8s ease, left .8s ease; }

    /* ── Sparkline (patrimonio histórico) ── */
    .sparkline-wrap { padding:14px 16px 10px; }

    /* ── Pie chart ── */
    .pie-wrap { display:flex; align-items:center; gap:18px; padding:14px 16px; }
    .pie-legend { flex:1; display:flex; flex-direction:column; gap:7px; min-width:0; }
    .pie-legend-item { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); }
    .pie-legend-sq { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

    /* ── Buttons ── */
    .btn-add { font-size:11px; font-weight:500; padding:5px 11px; border-radius:7px; border:0.5px solid var(--border); background:var(--bg-soft); color:var(--ink); cursor:pointer; font-family:var(--font-body); display:flex; align-items:center; gap:4px; white-space:nowrap; }
    .btn-primary { background:var(--green); color:#fff; border:none; padding:9px 20px; border-radius:9px; font-family:var(--font-body); font-size:13px; font-weight:500; cursor:pointer; transition:opacity .15s; }
    .btn-primary:hover { opacity:.88; }
    .btn-danger  { background:#D85A30; color:#fff; border:none; padding:9px 18px; border-radius:9px; font-family:var(--font-body); font-size:13px; font-weight:500; cursor:pointer; }
    .btn-cancel  { padding:9px 16px; border:0.5px solid var(--border); border-radius:9px; background:none; color:var(--muted); font-family:var(--font-body); font-size:13px; cursor:pointer; }
    .btn-icon    { border:none; background:none; color:var(--muted); cursor:pointer; font-size:14px; padding:3px 5px; line-height:1; font-family:var(--font-body); }
    .btn-small   { font-size:11px; padding:5px 12px; border:0.5px solid var(--border); border-radius:6px; background:var(--bg); color:var(--muted); cursor:pointer; font-family:var(--font-body); }
    .btn-outline { font-size:12px; font-weight:500; padding:7px 14px; border-radius:8px; border:0.5px solid var(--border); background:none; color:var(--ink); cursor:pointer; font-family:var(--font-body); display:flex; align-items:center; gap:6px; }

    /* ── Toggle tipo gasto/ingreso ── */
    .tipo-toggle { display:flex; border-radius:9px; overflow:hidden; border:0.5px solid var(--border); margin-bottom:13px; }
    .tipo-toggle-btn { flex:1; padding:9px; border:none; background:var(--bg-soft); font-family:var(--font-body); font-size:13px; font-weight:500; cursor:pointer; color:var(--muted); transition:all .15s; }
    .tipo-toggle-btn.active-gasto { background:#FAECE7; color:#993C1D; }
    .tipo-toggle-btn.active-ingreso { background:#E1F5EE; color:#0F6E56; }

    /* ── Checkbox ── */
    .checkbox { width:22px; height:22px; border-radius:6px; border:1.5px solid var(--border); background:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; }

    /* ── Modal ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.44); display:flex; align-items:flex-end; justify-content:center; z-index:200; animation:fadeIn .15s ease; }
    .modal-box { background:var(--bg); border-radius:20px 20px 0 0; padding:20px 20px calc(var(--safe-bottom) + 24px); width:100%; max-width:520px; max-height:92vh; overflow-y:auto; animation:slideUp .22s ease; }
    .modal-topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    .modal-title  { font-family:var(--font-display); font-size:20px; color:var(--ink); }
    .modal-close  { width:30px; height:30px; border-radius:50%; background:var(--bg-soft); border:0.5px solid var(--border); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; font-family:var(--font-body); flex-shrink:0; }
    .modal-actions { display:flex; gap:10px; margin-top:18px; justify-content:flex-end; flex-wrap:wrap; }

    /* ── Form ── */
    .field { margin-bottom:13px; }
    .field-label { font-size:10px; font-weight:500; color:var(--muted); margin-bottom:5px; display:block; text-transform:uppercase; letter-spacing:.6px; }
    .field-input { width:100%; padding:10px 12px; border:0.5px solid var(--border); border-radius:9px; background:var(--bg-soft); color:var(--ink); font-family:var(--font-body); font-size:14px; outline:none; -webkit-appearance:none; appearance:none; }
    .field-input:focus { border-color:var(--green); }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* ── Cashflow rows ── */
    .cf-row { display:flex; align-items:center; justify-content:space-between; padding:9px 15px; border-bottom:0.5px solid var(--border); font-size:12px; }
    .cf-row:last-child { border-bottom:none; }
    .cf-label { color:var(--muted); }
    .cf-value { font-family:var(--font-mono); font-weight:500; }

    /* ── Investment card ── */
    .inv-card { margin:10px 13px; padding:14px; border:0.5px solid var(--border); border-radius:11px; }
    .inv-metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; background:var(--bg-soft); border-radius:8px; padding:12px 10px; margin-bottom:10px; }
    .inv-metric-val { font-family:var(--font-mono); font-size:12px; font-weight:500; text-align:center; }
    .inv-metric-lbl { font-size:8px; color:var(--muted); text-align:center; margin-top:3px; }

    /* ── Estimated card ── */
    .est-card { margin:10px 13px; padding:14px; border:0.5px solid var(--border); border-radius:11px; }

    /* ── Settings section ── */
    .settings-section { margin-bottom:20px; }
    .settings-section-title { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin-bottom:10px; padding-left:2px; }
    .settings-row { display:flex; align-items:center; justify-content:space-between; padding:13px 15px; background:var(--bg); border-radius:var(--radius-md); border:0.5px solid var(--border); margin-bottom:8px; gap:12px; }
    .settings-row-info h4 { font-size:13px; font-weight:500; color:var(--ink); margin-bottom:2px; }
    .settings-row-info p  { font-size:11px; color:var(--muted); line-height:1.4; }

    /* ── Toast ── */
    .toast { position:fixed; bottom:calc(74px + var(--safe-bottom)); left:50%; transform:translateX(-50%); z-index:300; padding:11px 20px; border-radius:30px; font-size:13px; font-weight:500; white-space:nowrap; animation:slideUp .2s ease; pointer-events:none; box-shadow:0 4px 16px rgba(0,0,0,.12); }

    /* ── Confirm ── */
    .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.44); display:flex; align-items:center; justify-content:center; z-index:300; animation:fadeIn .15s ease; }
    .confirm-box { background:var(--bg); border-radius:var(--radius-lg); padding:24px; width:320px; max-width:88vw; border:0.5px solid var(--border); animation:popIn .2s ease; }
    .confirm-box h3 { font-size:16px; font-weight:500; color:var(--ink); margin-bottom:8px; }
    .confirm-box p  { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:20px; }

    /* ── Info note ── */
    .info-note { font-size:12px; color:var(--muted); margin-bottom:14px; line-height:1.6; padding:10px 12px; background:var(--bg-soft); border-radius:8px; }

    /* ── Preview boxes ── */
    .preview-box  { display:flex; justify-content:space-between; padding:10px 12px; border-radius:9px; font-size:12px; margin-bottom:6px; }
    .preview-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px; background:var(--bg-soft); border-radius:9px; margin-bottom:14px; text-align:center; }

    /* ── Limit input ── */
    .lim-input { width:80px; padding:4px 8px; border:0.5px solid var(--border); border-radius:6px; background:var(--bg-soft); color:var(--ink); font-family:var(--font-mono); font-size:12px; text-align:right; outline:none; }
    .lim-input:focus { border-color:var(--green); }

    /* ── Misc ── */
    .strike { text-decoration:line-through; opacity:.5; }
    .empty  { padding:32px; text-align:center; color:var(--muted); font-size:13px; }
    .divider { height:0.5px; background:var(--border); margin:6px 0; }
    .hidden-file { display:none; }

    /* ── Sparkline tooltip ── */
    .spark-point { cursor:pointer; }

    /* ════════ RESPONSIVE ════════ */
    @media (max-width:640px) {
      .bottom-nav { display:block; }
      .tab-nav { display:none; }
      .month-label { min-width:68px; font-size:11px; }
      .topbar { padding:calc(var(--safe-top) + 10px) 13px 10px; gap:8px; }
      .page-body { padding:14px 12px calc(90px + var(--safe-bottom)); }
      .kpi-grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
      .kpi-grid-3 { grid-template-columns:repeat(3,minmax(0,1fr)); gap:7px; }
      .kcard { padding:12px 13px; }
      .kcard-value { font-size:15px; }
      .kcard-label { font-size:9px; }
      .grid-2 { grid-template-columns:1fr; }
      .inv-metrics { grid-template-columns:repeat(2,1fr); }
      .pie-wrap { flex-direction:column; align-items:flex-start; }
    }
    @media (max-width:380px) {
      .kcard-value { font-size:13px; }
      .row { padding:9px 11px; gap:7px; }
    }
    @media (min-width:641px) {
      .modal-overlay { align-items:center; }
      .modal-box { border-radius:var(--radius-lg); max-width:450px; padding:26px; }
      .page-body { padding-bottom:32px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<input type="file" id="import-file" class="hidden-file" accept=".json" />

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ─── Constants ─── */
const STORAGE_KEY = "finanzio_v8";
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const TIPO_FAMILIA = {
  ETF:"RV", Acción:"RV", Crypto:"RV", Fondo:"RV", Inmueble:"RV",
  "Cuenta remunerada":"RF", Bono:"RF", P2P:"RF", Depósito:"RF",
  "Letras del Tesoro":"RF", Efectivo:"RF",
};
const RV_TIPOS = ["ETF","Acción","Crypto","Fondo","Inmueble"];
const RF_TIPOS = ["Cuenta remunerada","Bono","P2P","Depósito","Letras del Tesoro","Efectivo"];

const TIPO_PIE_COLORS = {
  ETF:"#1D9E75", Acción:"#185FA5", Crypto:"#BA7517", Fondo:"#534AB7", Inmueble:"#D85A30",
  "Cuenta remunerada":"#0C7B8A", Bono:"#1699AB", P2P:"#24AFBF",
  Depósito:"#3DC4D2", "Letras del Tesoro":"#55D8E4", Efectivo:"#7AE8EF",
};
const TIPO_COLORES = {
  ETF:{bg:"#E1F5EE",text:"#0F6E56"}, Acción:{bg:"#E6F1FB",text:"#185FA5"},
  Crypto:{bg:"#FAEEDA",text:"#854F0B"}, Fondo:{bg:"#EEEDFE",text:"#534AB7"},
  Inmueble:{bg:"#FAECE7",text:"#993C1D"},
  "Cuenta remunerada":{bg:"#E0F5F7",text:"#0C7B8A"}, Bono:{bg:"#E0F5F7",text:"#1699AB"},
  P2P:{bg:"#E0F5F7",text:"#24AFBF"}, Depósito:{bg:"#E0F5F7",text:"#3DC4D2"},
  "Letras del Tesoro":{bg:"#E0F5F7",text:"#0C7B8A"}, Efectivo:{bg:"#E0F5F7",text:"#0C7B8A"},
};
const CAT_PALETTE = [
  "#1D9E75","#185FA5","#BA7517","#D85A30","#534AB7","#888780",
  "#0F6E56","#854F0B","#993C1D","#0C447C","#3C3489","#5F5E5A",
];

/* ─── Persistence ─── */
function loadState() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    /* Try V7 data migration if no V8 data */
    const r7 = !r ? localStorage.getItem("finanzio_v7") : null;
    const raw = r || r7;
    if(!raw) return DEFAULT_STATE;
    const parsed = JSON.parse(raw);
    if(parsed.acts) {
      parsed.acts = parsed.acts.map(a => {
        const familia = TIPO_FAMILIA[a.tipo] || "RV";
        if(familia === "RF") {
          const migrated = {
            capitalInicial: a.capitalInicial ?? a.valorMercado ?? 0,
            interesesAcumuladosIniciales: a.interesesAcumuladosIniciales ?? 0,
            aportaciones: (a.aportaciones || []).filter(ap => !ap.esInteres),
            intereses: a.intereses ?? (a.aportaciones||[]).filter(ap=>ap.esInteres).map(ap=>({fecha:ap.fecha,importe:ap.importe,desc:ap.desc||"Interés migrado"})),
          };
          return { id:a.id, nombre:a.nombre, tipo:a.tipo, ...migrated };
        }
        return { ...a, aportaciones: a.aportaciones || [] };
      });
    }
    return {
      ...DEFAULT_STATE,
      ...parsed,
      ajusteSaldo: parsed.ajusteSaldo ?? 0,
      ingresosExtra: parsed.ingresosExtra ?? [],
    };
  } catch { return DEFAULT_STATE; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

/* ─── Asset helpers ─── */
const esRF = a => TIPO_FAMILIA[a.tipo] === "RF";

function calcCosteBase(a) {
  return r2(a.aportaciones.reduce((s,x)=>s+x.importe,0));
}
function calcBeneficio(a) {
  const coste = calcCosteBase(a);
  const bruto = r2(a.valorMercado - coste);
  return { bruto, pct: coste>0 ? r2((bruto/coste)*100) : 0, coste };
}
function calcRF_Capital(a) {
  return r2((a.capitalInicial||0) + (a.aportaciones||[]).reduce((s,x)=>s+x.importe,0));
}
function calcRF_Intereses(a) {
  return r2((a.interesesAcumuladosIniciales||0) + (a.intereses||[]).reduce((s,x)=>s+x.importe,0));
}
function calcRF_SaldoTotal(a) {
  return r2(calcRF_Capital(a) + calcRF_Intereses(a));
}
function calcRF_Rentabilidad(a) {
  const cap = calcRF_Capital(a);
  const int = calcRF_Intereses(a);
  return { intereses: int, pct: cap>0 ? r2((int/cap)*100) : 0, capital: cap };
}
function calcActivoValor(a) {
  return esRF(a) ? calcRF_SaldoTotal(a) : a.valorMercado;
}
function calcActivoCapital(a) {
  return esRF(a) ? calcRF_Capital(a) : calcCosteBase(a);
}
function calcActivoBeneficio(a) {
  if (esRF(a)) {
    const { intereses, pct, capital } = calcRF_Rentabilidad(a);
    return { bruto: intereses, pct, coste: capital };
  }
  return calcBeneficio(a);
}

/* ─── V8: Saldo incluye ingresos extra y ajuste bancario ─── */
function calcSaldo(s) {
  const gastos = s.fijos.reduce((a,f)=>a+f.importe,0) + s.vars.reduce((a,v)=>a+v.importe,0);
  const extras = (s.ingresosExtra||[]).reduce((a,ie)=>a+ie.importe,0);
  const ajuste = s.ajusteSaldo||0;
  return r2(s.ingresos + extras - gastos + ajuste);
}
function calcMargen(s) {
  return r2(s.ingresos - s.fijos.reduce((a,f)=>a+f.importe,0) - (s.invPlanificadas||0));
}
function calcPatrimonio(s) {
  return r2(calcSaldo(s) + s.acts.reduce((a,x)=>a+calcActivoValor(x),0));
}
function calcDisponibleReal(s) {
  const fijos = s.fijos.reduce((a,f)=>a+f.importe,0);
  const aportaciones = s.vars.filter(v=>v.cat==="Inversión").reduce((a,v)=>a+v.importe,0);
  const extras = (s.ingresosExtra||[]).reduce((a,ie)=>a+ie.importe,0);
  const ajuste = s.ajusteSaldo||0;
  return r2(s.ingresos + extras - fijos - aportaciones + ajuste);
}
function calcTasaAhorro(s) {
  const aportaciones = s.vars.filter(v=>v.cat==="Inversión").reduce((a,v)=>a+v.importe,0);
  const interesesRV = s.acts
    .filter(a=>!esRF(a))
    .reduce((a,act)=>a+(act.aportaciones||[]).filter(ap=>ap.esInteres).reduce((b,ap)=>b+ap.importe,0),0);
  const interesesRF = s.acts
    .filter(a=>esRF(a))
    .reduce((a,act)=>a+(act.intereses||[]).reduce((b,i)=>b+i.importe,0),0);
  return s.ingresos>0 ? r2(((aportaciones+interesesRV+interesesRF)/s.ingresos)*100) : 0;
}

/* ─── SVG Sparkline ─── */
function Sparkline({data, width=280, height=64}) {
  if (!data||data.length<2) return (
    <div style={{padding:"20px 16px",textAlign:"center",color:"var(--muted)",fontSize:12}}>
      Cierra meses para ver la evolución
    </div>
  );
  const vals = data.map(d=>d.valor);
  const min  = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pad   = {l:12, r:12, t:10, b:24};
  const W = width - pad.l - pad.r;
  const H = height - pad.t - pad.b;
  const pts = data.map((d,i) => ({
    x: pad.l + (i/(data.length-1))*W,
    y: pad.t + (1-(d.valor-min)/range)*H,
    label: d.label,
    valor: d.valor,
  }));
  const pathD = pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const areaD = pathD + ` L${pts[pts.length-1].x.toFixed(1)},${(pad.t+H).toFixed(1)} L${pts[0].x.toFixed(1)},${(pad.t+H).toFixed(1)} Z`;
  const isUp  = vals[vals.length-1] >= vals[0];
  const color = isUp ? "#1D9E75" : "#D85A30";
  const [tip, setTip] = useState(null);

  return (
    <div style={{position:"relative"}}>
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:"visible",display:"block"}}>
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity=".18"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={areaD} fill="url(#sg)"/>
        <path d={pathD} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="10" fill="transparent" className="spark-point"
              onMouseEnter={()=>setTip(p)} onMouseLeave={()=>setTip(null)}
              onTouchStart={()=>setTip(tip?.label===p.label?null:p)}/>
            <circle cx={p.x} cy={p.y} r="3" fill={color}/>
            <text x={p.x} y={pad.t+H+14} textAnchor="middle" fontSize="8" fill="var(--muted)">{p.label}</text>
          </g>
        ))}
        {tip&&(
          <g>
            <rect x={Math.min(tip.x-36, width-84)} y={tip.y-32} width="80" height="22" rx="5" fill="var(--bg)" stroke="var(--border)" strokeWidth="0.5"/>
            <text x={Math.min(tip.x-36,width-84)+40} y={tip.y-16} textAnchor="middle" fontSize="9" fontWeight="500" fill="var(--ink)" fontFamily="var(--font-mono)">{fmt(tip.valor)}</text>
          </g>
        )}
      </svg>
    </div>
  );
}

/* ─── SVG Pie chart ─── */
function PieChart({data, size=120}) {
  if(!data||!data.length) return null;
  const total = data.reduce((s,d)=>s+d.value,0);
  if(total<=0) return null;
  let startAngle = -Math.PI/2;
  const cx=size/2, cy=size/2, r=size/2-4;
  const slices = data.map(d=>{
    const angle = (d.value/total)*2*Math.PI;
    const endAngle = startAngle+angle;
    const x1=cx+r*Math.cos(startAngle), y1=cy+r*Math.sin(startAngle);
    const x2=cx+r*Math.cos(endAngle),   y2=cy+r*Math.sin(endAngle);
    const large = angle>Math.PI?1:0;
    const path = total===d.value
      ? `M${cx},${cy} m${-r},0 a${r},${r} 0 1,0 ${r*2},0 a${r},${r} 0 1,0 ${-r*2},0`
      : `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`;
    startAngle = endAngle;
    return {path, color:d.color, label:d.label, pct:Math.round((d.value/total)*100), value:d.value};
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>
      {slices.map((s,i)=>(
        <path key={i} d={s.path} fill={s.color} stroke="var(--bg)" strokeWidth="2"/>
      ))}
      <circle cx={cx} cy={cy} r={r*0.55} fill="var(--bg)"/>
    </svg>
  );
}

/* ─── Checkbox ─── */
function Checkbox({checked, onChange, overdue}) {
  return (
    <button onClick={onChange} className="checkbox"
      style={{borderColor:checked?"#1D9E75":overdue?"#BA7517":"var(--border)",
              background:checked?"#1D9E75":overdue?"#FAEEDA":"var(--bg)"}}>
      {checked && <I.Check/>}
      {!checked && overdue && <span style={{width:7,height:7,borderRadius:"50%",background:"#BA7517",display:"block"}}/>}
    </button>
  );
}

/* ─── Toast ─── */
function Toast({msg,type}) {
  if(!msg) return null;
  const s = {
    ok:  {background:"#E1F5EE",color:"#0F6E56",border:"0.5px solid #0F6E56"},
    err: {background:"#FAECE7",color:"#993C1D",border:"0.5px solid #993C1D"},
    info:{background:"#E6F1FB",color:"#0C447C",border:"0.5px solid #0C447C"},
  };
  return <div className="toast" style={s[type]||s.info}>{msg}</div>;
}

/* ─── Confirm dialog ─── */
function Confirm({open, title, msg, confirmLabel, confirmColor, onYes, onNo}) {
  if(!open) return null;
  return (
    <div className="confirm-overlay" onClick={e=>e.target===e.currentTarget&&onNo()}>
      <div className="confirm-box">
        <h3>{title||"¿Confirmar acción?"}</h3>
        <p>{msg}</p>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",flexWrap:"wrap"}}>
          <button className="btn-cancel" onClick={onNo}>Cancelar</button>
          <button className="btn-primary" style={{background:confirmColor||"#D85A30"}} onClick={onYes}>
            {confirmLabel||"Confirmar"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── Modal ─── */
function Modal({open, onClose, title, children}) {
  if(!open) return null;
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-topbar">
          <div className="modal-title">{title}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

          {title}
        </div>
        {action&&<div style={{display:"flex",gap:6,alignItems:"center"}}>{action}</div>}
      </div>
      <div>{children}</div>
    </div>
  );
}

/* ─── ProgressBar ─── */
function ProgressBar({pct, color}) {
  const c = color||(pct<70?"#1D9E75":pct<90?"#BA7517":"#D85A30");
  return (
    <div className="pbar-wrap">
      <div className="pbar-fill" style={{width:`${Math.min(100,pct)}%`,background:c}}/>
    </div>
  );
}

/* ─── Tag ─── */
function Tag({text,bg,color}) {
  return <span className="tag" style={{background:bg,color}}>{text}</span>;
}

/* ════════════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════════════ */

  const [fF,  setFF]  = useState({nombre:"",importe:"",dia:"",cat:"Suscripciones"});
  /* V8: fV ahora tiene campo esIngreso para marcar si es un ingreso */
  const [fV,  setFV]  = useState({desc:"",importe:"",fecha:today(),cat:"Ocio",newCat:"",useNewCat:false,esIngreso:false});
  const [fA,  setFA]  = useState({nombre:"",tipo:"ETF",valorMercado:"",valorInicial:"",capitalInicial:"",interesesAcumuladosIniciales:""});
  const [fAp, setFAp] = useState({aid:"",importe:"",fecha:today()});
  const [fVm, setFVm] = useState("");
  const [fIng,setFIng]= useState("");
  const [fMar,setFMar]= useState("");
  const [fEst,setFEst]= useState({nombre:"",presupuesto:"",real:"",cat:"Alimentación"});
  const [limEdit,setLimEdit] = useState({});
  const [fInt, setFInt] = useState({aid:"",importe:"",fecha:today(),desc:""});
  const [fSaldoReal, setFSaldoReal] = useState(""); /* V8: campo ajuste saldo real */

  const importRef = useRef(null);

  /* ── Persistence ── */
  useEffect(()=>{ saveState(S); }, [S]);

  /* ── Toast helper ── */
  const showToast = useCallback((msg,type="ok")=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  },[]);

  /* ── Derived values ── */
  const saldo      = useMemo(()=>calcSaldo(S),[S]);
  const margen     = useMemo(()=>calcMargen(S),[S]);
  const patrimonio = useMemo(()=>calcPatrimonio(S),[S]);
  const disponibleReal = useMemo(()=>calcDisponibleReal(S),[S]);
  const tasaAhorro     = useMemo(()=>calcTasaAhorro(S),[S]);
  const totalFijos = useMemo(()=>S.fijos.reduce((s,f)=>s+f.importe,0),[S.fijos]);
  /* V8: vars solo gastos (no ingresos extra) */
  const totalVars  = useMemo(()=>S.vars.reduce((s,v)=>s+v.importe,0),[S.vars]);
  const totalIngresosExtra = useMemo(()=>(S.ingresosExtra||[]).reduce((s,ie)=>s+ie.importe,0),[S.ingresosExtra]);
  const totalAportacionesMes = useMemo(()=>
    S.vars.filter(v=>v.cat==="Inversión").reduce((s,v)=>s+v.importe,0),[S.vars]);
  const totalInteresesGlobal = useMemo(()=>
    S.acts.reduce((a,act)=>{
      if(esRF(act)) return a+(act.intereses||[]).reduce((b,i)=>b+i.importe,0);
      return a+(act.aportaciones||[]).filter(ap=>ap.esInteres).reduce((b,ap)=>b+ap.importe,0);
    },0),[S.acts]);
  const totalInv   = useMemo(()=>S.acts.reduce((s,a)=>s+calcActivoCapital(a),0),[S.acts]);
  const totalMerc  = useMemo(()=>S.acts.reduce((s,a)=>s+calcActivoValor(a),0),[S.acts]);
  const benefTotal = useMemo(()=>r2(totalMerc-totalInv),[totalMerc,totalInv]);
  const rentTotal  = useMemo(()=>totalInv>0?r2((benefTotal/totalInv)*100):0,[benefTotal,totalInv]);

  const allCats = useMemo(()=>{
    const base=["Ocio","Ropa","Alimentación","Transporte","Salud","Inversión","Otros"];
    const extra=Object.keys(S.catColors||{}).filter(c=>!base.includes(c));
    return [...base,...extra];
  },[S.catColors]);

  const catColor = cat=>(S.catColors||DEFAULT_CAT_COLORS)[cat]||"#888780";

  const pieData = useMemo(()=>{
    const map={};
    S.acts.forEach(a=>{ map[a.tipo]=(map[a.tipo]||0)+calcActivoValor(a); });
    const arr = Object.entries(map).map(([tipo,value])=>({
      label:tipo, value,
      color: TIPO_PIE_COLORS[tipo]||"#888780",
      familia: TIPO_FAMILIA[tipo]||"RV",
    }));
    return [...arr.filter(d=>d.familia==="RV"), ...arr.filter(d=>d.familia==="RF")];
  },[S.acts]);

  const totalPieRV = useMemo(()=>pieData.filter(d=>d.familia==="RV").reduce((s,d)=>s+d.value,0),[pieData]);
  const totalPieRF = useMemo(()=>pieData.filter(d=>d.familia==="RF").reduce((s,d)=>s+d.value,0),[pieData]);

  const diaHoy=new Date().getDate(), mesHoy=new Date().getMonth();

  /* ── Navigation ── */
  const changeMonth = d=>{let nm=mo+d,ny=yr;if(nm>11){nm=0;ny++;}if(nm<0){nm=11;ny--;}setMo(nm);setYr(ny);};

  /* ════ BACKUP / RESTORE ════ */
  const exportData = () => {
    const blob = new Blob([JSON.stringify(S, null, 2)], {type:"application/json"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    const date = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `finanzio_backup_${date}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast("Backup exportado correctamente");
  };

  const importData = () => {
    const inp = document.getElementById("import-file");
    inp.value = "";
    inp.onchange = e => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          setS({...DEFAULT_STATE,...parsed});
          showToast("Datos importados correctamente");
        } catch {
          showToast("Error al leer el archivo JSON","err");
        }
      };
      reader.readAsText(file);
    };
    inp.click();
  };

  const resetAll = () => setConfirm({
    title:"Borrar todos los datos",
    msg:"Esta acción eliminará TODOS tus datos y no se puede deshacer. ¿Seguro que quieres continuar?",
    confirmLabel:"Sí, borrar todo",
    confirmColor:"#D85A30",
    onYes:()=>{
      setS({...DEFAULT_STATE});
      localStorage.removeItem(STORAGE_KEY);
      setConfirm(null);
      showToast("Datos borrados correctamente","info");
    }
  });

  /* ════ CERRAR MES ════ */
  const cerrarMes = () => setConfirm({
    title:"Cerrar mes",
    msg:`¿Guardar el patrimonio actual (${fmt(patrimonio)}) como cierre de ${MESES[mo]}?`,
    confirmLabel:"Cerrar mes",
    confirmColor:"#1D9E75",
    onYes:()=>{
      const entry = {label:MESES[mo].slice(0,3), valor:patrimonio};
      setS(s=>({...s, historicoPatrimonio:[...(s.historicoPatrimonio||[]).slice(-11), entry]}));
      setConfirm(null);
      showToast(`Mes ${MESES[mo]} cerrado. Patrimonio guardado.`);
    }
  });

  /* ════ ACTIONS: Gastos Fijos ════ */
  const addFijo = ()=>{
    if(!fF.nombre||!fF.importe) return showToast("Nombre e importe son obligatorios","err");
    setS(s=>({...s,fijos:[...s.fijos,{id:uid(),nombre:fF.nombre,importe:+fF.importe,dia:+fF.dia||1,cat:fF.cat,pagado:false}]}));
    setFF({nombre:"",importe:"",dia:"",cat:"Suscripciones"});setMFijo(false);showToast("Factura añadida");
  };
  const saveFijo = ()=>{
    if(!mEditFijo) return;
    setS(s=>({...s,fijos:s.fijos.map(f=>f.id===mEditFijo.id?{...mEditFijo,importe:+mEditFijo.importe,dia:+mEditFijo.dia}:f)}));
    setMEditFijo(null);showToast("Factura actualizada");
  };
  const toggleFijo = id=>setS(s=>({...s,fijos:s.fijos.map(f=>f.id===id?{...f,pagado:!f.pagado}:f)}));
  const deleteFijo = id=>setConfirm({
    title:"Eliminar factura",msg:"¿Eliminar esta factura fija?",confirmLabel:"Eliminar",
    onYes:()=>{setS(s=>({...s,fijos:s.fijos.filter(f=>f.id!==id)}));setConfirm(null);showToast("Eliminada","info");}
  });

  /* ════ ACTIONS: Variables (gastos + ingresos extra) ════ */
  /* V8: si esIngreso, guarda en ingresosExtra en lugar de vars */
  const addVar = ()=>{
    let cat = fV.useNewCat ? fV.newCat.trim() : fV.cat;
    if(!fV.desc||!fV.importe) return showToast("Descripción e importe son obligatorios","err");
    if(fV.esIngreso) {
      /* ── Ingreso extra: suma al saldo disponible ── */
      setS(s=>({...s, ingresosExtra:[...(s.ingresosExtra||[]),{id:uid(),desc:fV.desc,importe:+fV.importe,fecha:fV.fecha,cat:"Ingreso extra"}]}));
      setFV({desc:"",importe:"",fecha:today(),cat:"Ocio",newCat:"",useNewCat:false,esIngreso:false});
      setMVar(false);
      showToast("Ingreso extra registrado ↑");
      return;
    }
    /* ── Gasto normal ── */
    if(!cat) return showToast("Elige o escribe una categoría","err");
    if(fV.useNewCat && cat && !S.catColors[cat]) {
      const used = Object.values(S.catColors||{});
      const nc   = CAT_PALETTE.find(c=>!used.includes(c))||CAT_PALETTE[0];
      setS(s=>({...s,catColors:{...s.catColors,[cat]:nc},lim:{...s.lim,[cat]:100},
        vars:[...s.vars,{id:uid(),desc:fV.desc,importe:+fV.importe,cat,fecha:fV.fecha}]}));
    } else {
      setS(s=>({...s,vars:[...s.vars,{id:uid(),desc:fV.desc,importe:+fV.importe,cat,fecha:fV.fecha}]}));
    }
    setFV({desc:"",importe:"",fecha:today(),cat:"Ocio",newCat:"",useNewCat:false,esIngreso:false});
    setMVar(false);showToast("Gasto registrado");
  };
  const saveVar = ()=>{
    if(!mEditVar) return;
    setS(s=>({...s,vars:s.vars.map(v=>v.id===mEditVar.id?{...mEditVar,importe:+mEditVar.importe}:v)}));
    setMEditVar(null);showToast("Gasto actualizado");
  };
  const deleteVar = id=>setConfirm({
    title:"Eliminar gasto",msg:"¿Eliminar este gasto variable?",confirmLabel:"Eliminar",
    onYes:()=>{setS(s=>({...s,vars:s.vars.filter(v=>v.id!==id)}));setConfirm(null);showToast("Eliminado","info");}
  });
  const deleteIngresoExtra = id=>setConfirm({
    title:"Eliminar ingreso",msg:"¿Eliminar este ingreso extra?",confirmLabel:"Eliminar",
    onYes:()=>{setS(s=>({...s,ingresosExtra:(s.ingresosExtra||[]).filter(ie=>ie.id!==id)}));setConfirm(null);showToast("Eliminado","info");}
  });

  /* ════ ACTIONS: Activos ════ */
  const addActivo = ()=>{
    if(!fA.nombre) return showToast("El nombre es obligatorio","err");
    const tipoRF = TIPO_FAMILIA[fA.tipo]==="RF";

    if(tipoRF) {
      const cap = +fA.capitalInicial||0;
      const intAcum = +fA.interesesAcumuladosIniciales||0;
      if(cap<=0) return showToast("El capital inicial es obligatorio para activos de interés","err");
      setS(s=>({...s,acts:[...s.acts,{
        id:uid(), nombre:fA.nombre, tipo:fA.tipo,
        capitalInicial: cap,
        interesesAcumuladosIniciales: intAcum,
        aportaciones: [],
        intereses: [],
      }]}));
    } else {
      const vm = +fA.valorMercado;
      const vi = +fA.valorInicial||0;
      if(!fA.valorMercado) return showToast("El valor de mercado es obligatorio","err");
      const aportacionesIniciales = vi>0
        ? [{fecha:today(),importe:vi,esPatrimonioPreexistente:true}]
        : [];
      setS(s=>({...s,acts:[...s.acts,{
        id:uid(), nombre:fA.nombre, tipo:fA.tipo,
        valorMercado: r2(vm+vi), valorInicial: vi,
        aportaciones: aportacionesIniciales,
      }]}));
    }

    setFA({nombre:"",tipo:"ETF",valorMercado:"",valorInicial:"",capitalInicial:"",interesesAcumuladosIniciales:""});
    setMActivo(false);
    showToast("Activo añadido");
  };
  const deleteActivo = id=>setConfirm({
    title:"Eliminar activo",msg:"¿Eliminar este activo y todo su historial?",confirmLabel:"Eliminar",
    onYes:()=>{setS(s=>({...s,acts:s.acts.filter(a=>a.id!==id)}));setConfirm(null);showToast("Eliminado","info");}
  });
  const updateValorMercado = ()=>{
    if(!fVm||isNaN(+fVm)) return showToast("Valor inválido","err");
    const a=S.acts.find(x=>x.id===mValor);
    if(!a||esRF(a)) return showToast("Esta operación sólo aplica a activos de Renta Variable","err");
    setS(s=>({...s,acts:s.acts.map(a=>a.id===mValor?{...a,valorMercado:+fVm}:a)}));
    setMValor(null);setFVm("");showToast("Valor de mercado actualizado");
  };

  /* ════ ACTIONS: Aportación ════ */
  const addAportacion = ()=>{
    const imp=+fAp.importe;
    if(!fAp.aid||!imp) return showToast("Selecciona activo e importe","err");
    if(imp<=0) return showToast("El importe debe ser positivo","err");
    if(imp>saldo) return showToast(`Saldo insuficiente. Disponible: ${fmt(saldo)}`,"err");
    const activo=S.acts.find(a=>a.id===fAp.aid);
    if(!activo) return showToast("Activo no encontrado","err");
    const isActRF = esRF(activo);
    setS(s=>({...s,
      acts:s.acts.map(a=>a.id===fAp.aid ? (
        isActRF
          ? {...a, aportaciones:[...(a.aportaciones||[]),{fecha:fAp.fecha,importe:imp}]}
          : {...a, valorMercado:r2(a.valorMercado+imp), aportaciones:[...a.aportaciones,{fecha:fAp.fecha,importe:imp}]}
      ):a),
      vars:[...s.vars,{id:uid(),desc:`Aportación → ${activo.nombre}`,importe:imp,cat:"Inversión",fecha:fAp.fecha}]
    }));
    showToast(`${fmt(imp)} aportados a ${activo.nombre}`);
    setFAp({aid:"",importe:"",fecha:today()});setMAport(false);
  };

  /* ════ ACTIONS: Interés / Rendimiento ════
     V8: Los intereses NUNCA restan del saldo — solo suman valor al activo.
     RF: push a intereses[], sin tocar vars ni saldo
     RV: bump valorMercado + flag esInteres en aportaciones (no genera gasto)
  */
  const addInteres = ()=>{
    const imp=+fInt.importe;
    if(!fInt.aid||!imp) return showToast("Selecciona activo e importe","err");
    if(imp<=0) return showToast("El importe debe ser positivo","err");
    const activo=S.acts.find(a=>a.id===fInt.aid);
    if(!activo) return showToast("Activo no encontrado","err");
    const desc = fInt.desc.trim()||`Interés/Rendimiento`;
    const isActRF = esRF(activo);
    setS(s=>({...s,
      acts:s.acts.map(a=>a.id===fInt.aid ? (
        isActRF
          ? {...a, intereses:[...(a.intereses||[]),{fecha:fInt.fecha,importe:imp,desc}]}
          : {...a, valorMercado:r2(a.valorMercado+imp),
              aportaciones:[...a.aportaciones,{fecha:fInt.fecha,importe:imp,esInteres:true,desc}]}
      ):a)
      /* Nota V8: NO se añade nada a vars → los intereses nunca restan del saldo disponible */
    }));
    showToast(`${fmt(imp)} de interés añadidos a ${activo.nombre}`);
    setFInt({aid:"",importe:"",fecha:today(),desc:""});
    setMInteres(false);
  };

  /* ════ ACTIONS: Estimados ════ */
  const addEstimado = ()=>{
    if(!fEst.nombre||!fEst.presupuesto) return showToast("Nombre y presupuesto son obligatorios","err");
    setS(s=>({...s,estimados:[...s.estimados,{id:uid(),nombre:fEst.nombre,presupuesto:+fEst.presupuesto,real:+fEst.real||0,cat:fEst.cat}]}));
    setFEst({nombre:"",presupuesto:"",real:"",cat:"Alimentación"});setMAddEst(false);showToast("Gasto estimado añadido");
  };
  const saveEstimado = ()=>{
    if(!mEditEst) return;
    setS(s=>({...s,estimados:s.estimados.map(e=>e.id===mEditEst.id?{...mEditEst,presupuesto:+mEditEst.presupuesto,real:+mEditEst.real}:e)}));
    setMEditEst(null);showToast("Estimado actualizado");
  };
  const deleteEstimado = id=>setConfirm({
    title:"Eliminar estimado",msg:"¿Eliminar este gasto estimado?",confirmLabel:"Eliminar",
    onYes:()=>{setS(s=>({...s,estimados:s.estimados.filter(e=>e.id!==id)}));setConfirm(null);showToast("Eliminado","info");}
  });

  /* ════ ACTIONS: Límites ════ */
  const openLimites = ()=>{setLimEdit({...S.lim});setMLimites(true);};
  const saveLimites = ()=>{
    const p={};
    Object.entries(limEdit).forEach(([k,v])=>{if(!isNaN(+v)&&+v>=0)p[k]=+v;});
    setS(s=>({...s,lim:{...s.lim,...p}}));
    setMLimites(false);showToast("Límites guardados");
  };

  /* ════ ACTIONS: Ingresos & Margen ════ */
  const updateIngresos = ()=>{
    if(!fIng||isNaN(+fIng)) return showToast("Ingreso inválido","err");
    setS(s=>({...s,ingresos:+fIng}));setMIngresos(false);setFIng("");showToast("Ingreso actualizado");
  };
  const updateMargen = ()=>{
    if(fMar===""||isNaN(+fMar)) return showToast("Valor inválido","err");
    setS(s=>({...s,invPlanificadas:+fMar}));setMMargen(false);setFMar("");showToast("Inversión planificada actualizada");
  };

  /* ════ V8: ACTIONS: Ajuste de saldo real (sincronización bancaria) ════ */
  const ajustarSaldoReal = ()=>{
    const saldoReal = +fSaldoReal;
    if(fSaldoReal===""||isNaN(saldoReal)) return showToast("Introduce un saldo válido","err");
    /* diferencia = saldoReal - saldoCalculado → se suma como offset */
    const diferencia = r2(saldoReal - saldo);
    setS(s=>({...s, ajusteSaldo:r2((s.ajusteSaldo||0)+diferencia)}));
    setMAjusteSaldo(false);
    setFSaldoReal("");
    if(diferencia>0) showToast(`Saldo ajustado: +${fmt(diferencia)} añadidos al disponible`);
    else if(diferencia<0) showToast(`Saldo ajustado: ${fmt(diferencia)} descontados del disponible`,"info");
    else showToast("El saldo ya coincide con el banco");
  };
  const resetAjuste = ()=>setConfirm({
    title:"Resetear ajuste bancario",
    msg:"¿Eliminar el ajuste manual de saldo y volver al cálculo automático?",
    confirmLabel:"Resetear",
    confirmColor:"#BA7517",
    onYes:()=>{setS(s=>({...s,ajusteSaldo:0}));setConfirm(null);showToast("Ajuste eliminado","info");}
  });

  /* ════════════════════════════
     TAB: INICIO
  ════════════════════════════ */
  function TabResumen() {
    const gastoTotal = totalFijos + totalVars;
    const ahorroAbs  = r2(S.ingresos + totalIngresosExtra - gastoTotal + (S.ajusteSaldo||0));
    const baseCalc   = S.ingresos + totalIngresosExtra;
    const ahorroPct  = baseCalc>0 ? Math.max(0,Math.round((ahorroAbs/baseCalc)*100)) : 0;
    const fijoPct    = baseCalc>0 ? Math.min(100,Math.round((totalFijos/baseCalc)*100)) : 0;
    const varPct     = baseCalc>0 ? Math.min(100,Math.round((totalVars/baseCalc)*100)) : 0;
    const cats       = allCats.filter(c=>S.lim[c]);

    return (
      <>
        {/* ── KPIs principales ── */}
        <div className="kpi-grid">
          <KCard label="Ingresos base" value={fmt(S.ingresos)} accent="#1D9E75"
            onClick={()=>{setFIng(String(S.ingresos));setMIngresos(true);}}
            sub={totalIngresosExtra>0?`+ ${fmt(totalIngresosExtra)} extra`:"Toca para editar"}
            blurred={false}/>
          <KCard label="Gastos totales" value={fmt(gastoTotal)} accent="#D85A30"
            sub={`${fmt(totalFijos)} fijos`}/>
          <KCard label="Saldo disponible" value={fmt(saldo)} accent={saldo>=0?"#1D9E75":"#D85A30"}
            delta={saldo<0?"Saldo negativo":(S.ajusteSaldo||0)!==0?`Ajuste: ${fmt(S.ajusteSaldo)}`:null}
            deltaUp={saldo>=0} blurred={privacy}/>
          <KCard label="Patrimonio neto" value={fmt(patrimonio)} accent="#185FA5"
            sub="Liquidez + cartera" blurred={privacy}/>
        </div>

        {/* ── Disponible Real + Tasa de Ahorro ── */}
        <div className="kpi-grid-2" style={{marginBottom:16}}>
          <KCard
            label="Disponible real para variables"
            value={fmt(disponibleReal)}
            accent={disponibleReal>=0?"#534AB7":"#D85A30"}
            sub={
              <span>
                {fmt(S.ingresos)}{totalIngresosExtra>0&&` + ${fmt(totalIngresosExtra)} extra`} − {fmt(totalFijos)} fijos − {fmt(totalAportacionesMes)} aportado
                {(S.invPlanificadas||0)>0 &&
                  <span style={{display:"block",marginTop:2,color:"var(--hint)"}}>
                    (Inv. planificada: {fmt(S.invPlanificadas)} — toca para editar)
                  </span>
                }
              </span>
            }
            delta={disponibleReal<0?"Insuficiente":null} deltaUp={false}
            onClick={()=>{setFMar(String(S.invPlanificadas||0));setMMargen(true);}}

          <KCard
            label="Tasa de ahorro mensual"
            value={`${fmtN(tasaAhorro)}%`}
            accent="#1D9E75"
            sub={
              <span>

                {totalInteresesGlobal>0 && ` + ${fmt(totalInteresesGlobal)} intereses`}
