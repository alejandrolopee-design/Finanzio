        {/* ── Barra de ahorro mensual ── */}
        <div className="panel" style={{marginBottom:14}}>
          <div className="panel-header">
            <div className="panel-title">
              <span className="panel-icon" style={{background:"#E1F5EE"}}>💰</span>
              Distribución de ingresos
            </div>
            <span style={{fontSize:11,fontFamily:"var(--font-mono)",fontWeight:500,
              color:ahorroAbs>=0?"#1D9E75":"#D85A30"}} className={privacy?"privacy-blur":""}>
              {ahorroAbs>=0?"+":""}{fmt(ahorroAbs)} · {ahorroPct}% ahorro
            </span>
          </div>
          <div style={{padding:"14px 15px"}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--muted)",marginBottom:6}}>
              <span>0 €</span><span>{fmt(S.ingresos + totalIngresosExtra)}</span>
            </div>
            <div className="sbar-track">
              <div className="sbar-seg" style={{left:0,width:`${fijoPct}%`,background:"#D85A30"}}/>
              <div className="sbar-seg" style={{left:`${fijoPct}%`,width:`${varPct}%`,background:"#BA7517"}}/>
              <div className="sbar-seg" style={{left:`${Math.min(100,fijoPct+varPct)}%`,
                width:`${Math.max(0,100-fijoPct-varPct)}%`,background:"#E1F5EE"}}/>
            </div>
            <div style={{display:"flex",gap:14,marginTop:8,flexWrap:"wrap"}}>
              {[
                {label:`Fijos ${fmt(totalFijos)}`,    color:"#D85A30"},
                {label:`Variables ${fmt(totalVars)}`, color:"#BA7517"},
                {label:`Ahorro ${fmt(ahorroAbs)}`,    color:"#1D9E75"},
              ].map(l=>(
                <span key={l.label} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"var(--muted)"}}>
                  <span style={{width:8,height:8,borderRadius:2,background:l.color,display:"inline-block"}}/>
                  {l.label}
                </span>
              ))}
            </div>
          </div>
        </div>

        {/* ── Histórico patrimonio ── */}
        <div className="panel" style={{marginBottom:14}}>
          <div className="panel-header">
            <div className="panel-title">
              <span className="panel-icon" style={{background:"#E6F1FB"}}>📈</span>
              Evolución del patrimonio
            </div>
            <button className="btn-outline" onClick={cerrarMes} style={{fontSize:11,padding:"5px 11px"}}>
              <I.Flag/> Cerrar mes
            </button>
          </div>
          <Sparkline data={S.historicoPatrimonio||[]} width={600} height={80}/>
        </div>

        <div className="grid-2">
          {/* Facturas */}
          <Panel icon="📋" iconBg="#FAECE7" title="Facturas del mes"
            action={<span style={{fontSize:11,color:"var(--muted)"}}>{S.fijos.filter(f=>f.pagado).length}/{S.fijos.length}</span>}>
            {S.fijos.slice(0,5).map(f=>{
              const vencida=!f.pagado&&f.dia<diaHoy&&mo===mesHoy;
              return (
                <div key={f.id} className={`row${vencida?" row-overdue":""}`}>
                  <span className="dot" style={{background:catColor(f.cat)}}/>
                  <div className="row-info">
                    <div className={`row-name${f.pagado?" strike":""}`}>{f.nombre}</div>
                    <div className="row-sub">Día {f.dia}</div>
                  </div>
                  <Tag text={f.pagado?"✓ OK":vencida?"⚠ Vencida":"Pendiente"}
                    bg={f.pagado?"#E1F5EE":vencida?"#FAEEDA":"var(--bg-soft)"}
                    color={f.pagado?"#0F6E56":vencida?"#854F0B":"var(--muted)"}/>
                  <div className={`row-amount${privacy?" privacy-blur":""}`}>{fmt(f.importe)}</div>
                </div>
              );
            })}
            {S.fijos.length>5&&<div style={{padding:"8px 15px",fontSize:11,color:"var(--muted)"}}>+{S.fijos.length-5} más en pestaña Fijos</div>}
          </Panel>

          {/* Presupuesto categorías */}
          <Panel icon="📊" iconBg="#FAEEDA" title="Presupuesto">
            {cats.slice(0,7).map(cat=>{
              const g=S.vars.filter(v=>v.cat===cat).reduce((s,v)=>s+v.importe,0);
              const l=S.lim[cat]||0, p=l>0?Math.round(g/l*100):0;
              return (
                <div key={cat} className="row">
                  <span className="dot" style={{background:catColor(cat)}}/>
                  <div className="row-info">
                    <div className="row-name">{cat}</div>
                    <ProgressBar pct={p}/>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div className={`row-amount${privacy?" privacy-blur":""}`} style={{fontSize:11}}>{fmt(g)}/{fmt(l)}</div>
                    <div className="row-sub">{p}%</div>
                  </div>
                </div>
              );
            })}
          </Panel>
        </div>

        {/* Flujo + Patrimonio */}
        <div className="grid-2">
          {/* V8: Flujo de caja incluye ingresos extra */}
          <Panel icon="💸" iconBg="#E1F5EE" title="Flujo de caja">
            <div className="cf-row">
              <span className="cf-label">+ Ingresos base</span>
              <span className={`cf-value${privacy?" privacy-blur":""}`} style={{color:"#1D9E75"}}>{fmt(S.ingresos)}</span>
            </div>
            {totalIngresosExtra>0&&(
              <div className="cf-row">
                <span className="cf-label">+ Ingresos extra</span>
                <span className={`cf-value${privacy?" privacy-blur":""}`} style={{color:"#0C7B8A"}}>{fmt(totalIngresosExtra)}</span>
              </div>
            )}
            <div className="cf-row">
              <span className="cf-label">− Gastos fijos</span>
              <span className={`cf-value${privacy?" privacy-blur":""}`} style={{color:"#D85A30"}}>-{fmt(totalFijos)}</span>
            </div>
            <div className="cf-row">
              <span className="cf-label">− Variables</span>
              <span className={`cf-value${privacy?" privacy-blur":""}`} style={{color:"#BA7517"}}>-{fmt(totalVars)}</span>
            </div>
            {(S.ajusteSaldo||0)!==0&&(
              <div className="cf-row">
                <span className="cf-label">⚖ Ajuste bancario</span>
                <span className={`cf-value${privacy?" privacy-blur":""}`} style={{color:(S.ajusteSaldo||0)>=0?"#185FA5":"#D85A30"}}>{(S.ajusteSaldo||0)>=0?"+":""}{fmt(S.ajusteSaldo)}</span>
              </div>
            )}
            <div className="cf-row" style={{borderTop:"1px solid var(--border)"}}>
              <span style={{fontWeight:600,fontSize:12}}>= Saldo neto</span>
              <span className={`cf-value${privacy?" privacy-blur":""}`} style={{fontSize:14,color:saldo>=0?"#1D9E75":"#D85A30"}}>{fmt(saldo)}</span>
            </div>
          </Panel>
          <Panel icon="🏦" iconBg="#E6F1FB" title="Patrimonio neto">
            {[
              {l:"Liquidez",         v:fmt(saldo),     c:"#1D9E75"},
              {l:"Capital invertido",v:fmt(totalInv),  c:"var(--ink)"},
              {l:"Valor mercado",    v:fmt(totalMerc), c:"var(--ink)"},
              {l:"Beneficio",        v:`${benefTotal>=0?"+":""}${fmt(benefTotal)}`,c:benefTotal>=0?"#1D9E75":"#D85A30"},
            ].map(r=>(
              <div key={r.l} className="cf-row">
                <span className="cf-label">{r.l}</span>
                <span className={`cf-value${privacy?" privacy-blur":""}`} style={{color:r.c}}>{r.v}</span>
              </div>
            ))}
            <div className="cf-row" style={{borderTop:"1px solid var(--border)"}}>
              <span style={{fontWeight:600,fontSize:12}}>= Patrimonio</span>
              <span className={`cf-value${privacy?" privacy-blur":""}`} style={{fontSize:14}}>{fmt(patrimonio)}</span>
            </div>
          </Panel>
        </div>
      </>
    );
  }

  /* ════════════════════════════
     TAB: GASTOS FIJOS
  ════════════════════════════ */
  function TabFijos() {
    const pendientes = S.fijos.filter(f=>!f.pagado);
    const ejecutadas = S.fijos.filter(f=>f.pagado);
    const vencidas   = pendientes.filter(f=>f.dia<diaHoy&&mo===mesHoy);
    return (
      <>
        <div className="kpi-grid">
          <KCard label="Total mensual" value={fmt(totalFijos)} accent="#D85A30" blurred={privacy}/>
          <KCard label="Ejecutadas" value={`${ejecutadas.length}/${S.fijos.length}`}
            sub={fmt(ejecutadas.reduce((s,f)=>s+f.importe,0))} accent="#1D9E75" blurred={privacy}/>
          <KCard label="Pendientes" value={pendientes.length}
            sub={fmt(pendientes.reduce((s,f)=>s+f.importe,0))} accent="#BA7517" blurred={privacy}/>
          <KCard label="Vencidas" value={vencidas.length} accent={vencidas.length>0?"#D85A30":"#888780"}
            delta={vencidas.length>0?"Atención":null} deltaUp={false}/>
        </div>
        <Panel icon="📋" iconBg="#FAECE7" title="Facturas recurrentes"
          action={<button className="btn-add" onClick={()=>setMFijo(true)}><I.Plus/> Añadir</button>}>
          {S.fijos.length===0&&<div className="empty">Sin facturas. Pulsa Añadir para crear la primera.</div>}
          {S.fijos.map(f=>{
            const vencida=!f.pagado&&f.dia<diaHoy&&mo===mesHoy;
            return (
              <div key={f.id} className={`row${vencida?" row-overdue":""}`}>
                <Checkbox checked={f.pagado} overdue={vencida} onChange={()=>toggleFijo(f.id)}/>
                <span className="dot" style={{background:catColor(f.cat)}}/>
                <div className="row-info">
                  <div className={`row-name${f.pagado?" strike":""}`}>{f.nombre}</div>
                  <div className="row-sub">Día {f.dia} · {f.cat}{vencida&&<span style={{marginLeft:5,color:"#BA7517",fontWeight:500}}> — vencida</span>}</div>
                </div>
                <Tag text={f.pagado?"✓ Ejecutado":vencida?"⚠ Vencida":"Pendiente"}
                  bg={f.pagado?"#E1F5EE":vencida?"#FAEEDA":"var(--bg-soft)"}
                  color={f.pagado?"#0F6E56":vencida?"#854F0B":"var(--muted)"}/>
                <div className={`row-amount${privacy?" privacy-blur":""}`}>{fmt(f.importe)}</div>
                <button className="btn-icon" onClick={()=>setMEditFijo({...f})}><I.Edit/></button>
                <button className="btn-icon" onClick={()=>deleteFijo(f.id)}>×</button>
              </div>
            );
          })}
        </Panel>
        <Panel icon="📐" iconBg="#E6F1FB" title="Gastos estimados"
          action={<button className="btn-add" onClick={()=>setMAddEst(true)}><I.Plus/> Añadir</button>}>
          {(!S.estimados||S.estimados.length===0)&&<div className="empty">Sin gastos estimados</div>}
          {(S.estimados||[]).map(e=>{
            const pct=e.presupuesto>0?Math.round((e.real/e.presupuesto)*100):0;
            const excess=e.real>e.presupuesto;
            return (
              <div key={e.id} className="est-card">
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--ink)"}}>{e.nombre}</div>
                    <div style={{fontSize:10,color:"var(--muted)"}}>{e.cat}</div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <Tag text={excess?"Excedido":`${pct}%`}
                      bg={excess?"#FAECE7":pct>80?"#FAEEDA":"#E1F5EE"}
                      color={excess?"#993C1D":pct>80?"#854F0B":"#0F6E56"}/>
                    <button className="btn-icon" onClick={()=>setMEditEst({...e})}><I.Edit/></button>
                    <button className="btn-icon" onClick={()=>deleteEstimado(e.id)}>×</button>
                  </div>
                </div>
                <ProgressBar pct={pct} color={excess?"#D85A30":pct>80?"#BA7517":"#1D9E75"}/>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginTop:6,color:"var(--muted)"}}>
                  <span>Real: <strong style={{color:"var(--ink)",fontFamily:"var(--font-mono)"}} className={privacy?"privacy-blur":""}>{fmt(e.real)}</strong></span>
                  <span>Presupuesto: <strong style={{fontFamily:"var(--font-mono)"}} className={privacy?"privacy-blur":""}>{fmt(e.presupuesto)}</strong></span>
                </div>
              </div>
            );
          })}
        </Panel>
      </>
    );
  }

  /* ════════════════════════════
     TAB: VARIABLES
  ════════════════════════════ */
  function TabVariables() {
    const totalL=Object.values(S.lim).reduce((s,v)=>s+v,0);
    return (
      <>
        <div className="kpi-grid-3">
          <KCard label="Gastado" value={fmt(totalVars)} accent="#D85A30" blurred={privacy}/>
          <KCard label="Presupuesto" value={fmt(totalL)} accent="#888780" blurred={privacy}/>
          <KCard label="Restante" value={fmt(totalL-totalVars)} accent={totalL-totalVars>=0?"#1D9E75":"#D85A30"} blurred={privacy}/>
        </div>

        {/* V8: panel ingresos extra */}
        {(S.ingresosExtra||[]).length>0&&(
          <Panel icon="💚" iconBg="#E1F5EE" title="Ingresos extra del mes"
            action={<span className={`row-amount${privacy?" privacy-blur":""}`} style={{color:"#0F6E56",fontSize:13}}>+{fmt(totalIngresosExtra)}</span>}>
            {[...(S.ingresosExtra||[])].reverse().map(ie=>(
              <div key={ie.id} className="row">
                <span className="dot" style={{background:"#1D9E75"}}/>
                <div className="row-info">
                  <div className="row-name">{ie.desc}</div>
                  <div className="row-sub">{ie.fecha} · Ingreso extra</div>
                </div>
                <Tag text="↑ Ingreso" bg="#E1F5EE" color="#0F6E56"/>
                <div className={`row-amount${privacy?" privacy-blur":""}`} style={{color:"#0F6E56"}}>+{fmt(ie.importe)}</div>
                <button className="btn-icon" onClick={()=>deleteIngresoExtra(ie.id)}>×</button>
              </div>
            ))}
          </Panel>
        )}

        <div className="grid-2">
          <Panel icon="🧾" iconBg="#FAEEDA" title="Gastos del mes"
            action={<button className="btn-add" onClick={()=>setMVar(true)}><I.Plus/> Añadir</button>}>
            {[...S.vars].reverse().map(v=>(
              <div key={v.id} className="row">
                <span className="dot" style={{background:catColor(v.cat)}}/>
                <div className="row-info">
                  <div className="row-name">{v.desc}</div>
                  <div className="row-sub">{v.fecha} · {v.cat}</div>
                </div>
                {v.cat==="Inversión"&&<Tag text="Inv." bg="#EEEDFE" color="#534AB7"/>}
                <div className={`row-amount${privacy?" privacy-blur":""}`} style={{color:v.cat==="Inversión"?"#534AB7":"var(--ink)"}}>{fmt(v.importe)}</div>
                <button className="btn-icon" onClick={()=>setMEditVar({...v})}><I.Edit/></button>
                <button className="btn-icon" onClick={()=>deleteVar(v.id)}>×</button>
              </div>
            ))}
            {S.vars.length===0&&<div className="empty">Sin gastos registrados</div>}
          </Panel>
          <Panel icon="🎯" iconBg="#FAEEDA" title="Límites por categoría"
            action={<button className="btn-add" onClick={openLimites}>Editar límites</button>}>
            {allCats.filter(c=>S.lim[c]!=null).map(cat=>{
              const g=S.vars.filter(v=>v.cat===cat).reduce((s,v)=>s+v.importe,0);
              const l=S.lim[cat]||0, p=l>0?Math.round(g/l*100):0;
              return (
                <div key={cat} className="row">
                  <span className="dot" style={{background:catColor(cat)}}/>
                  <div className="row-info">
                    <div className="row-name">{cat}</div>
                    <ProgressBar pct={p}/>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div className={`row-amount${privacy?" privacy-blur":""}`} style={{fontSize:11}}>{fmt(g)}/{fmt(l)}</div>
                    <div className="row-sub">{p}%</div>
                  </div>
                </div>
              );
            })}
          </Panel>
        </div>
      </>
    );
  }

  /* ════════════════════════════
     TAB: INVERSIONES
  ════════════════════════════ */
  function TabInversiones() {
    return (
      <>
        <div className="kpi-grid-3">
          <KCard label="Capital total" value={fmt(totalInv)} accent="#185FA5"
            sub="RV: coste base · RF: capital" blurred={privacy}/>
          <KCard label="Valor / Saldo total" value={fmt(totalMerc)} accent="#1D9E75"
            sub="RV: precio mercado · RF: capital + intereses" blurred={privacy}/>
          <KCard label="Rentabilidad total" value={`${benefTotal>=0?"+":""}${fmtN(rentTotal)}%`}
            accent={benefTotal>=0?"#1D9E75":"#D85A30"}
            delta={`${benefTotal>=0?"+":""}${fmt(benefTotal)} beneficio`} deltaUp={benefTotal>=0}/>
        </div>

        <div className="grid-2">
          <Panel icon="🥧" iconBg="#EEEDFE" title="Distribución cartera">
            {S.acts.length===0
              ? <div className="empty">Sin activos</div>
              : <div className="pie-wrap">
                  <PieChart data={pieData} size={120}/>
                  <div className="pie-legend">
                    {pieData.filter(d=>d.familia==="RV").length>0&&(
                      <div style={{fontSize:8,fontWeight:600,textTransform:"uppercase",letterSpacing:".6px",color:"var(--muted)",marginBottom:3}}>Renta variable</div>
                    )}
                    {pieData.filter(d=>d.familia==="RV").map(d=>(
                      <div key={d.label} className="pie-legend-item">
                        <span className="pie-legend-sq" style={{background:d.color}}/>
                        <span style={{flex:1}}>{d.label}</span>
                        <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",fontWeight:500,color:"var(--ink)",marginRight:4}}>{fmt(d.value)}</span>
                        <span style={{color:"var(--muted)"}}>{totalMerc>0?Math.round((d.value/totalMerc)*100):0}%</span>
                      </div>
                    ))}
                    {pieData.filter(d=>d.familia==="RF").length>0&&(
                      <div style={{fontSize:8,fontWeight:600,textTransform:"uppercase",letterSpacing:".6px",color:"var(--muted)",marginTop:6,marginBottom:3}}>Renta fija / efectivo</div>
                    )}
                    {pieData.filter(d=>d.familia==="RF").map(d=>(
                      <div key={d.label} className="pie-legend-item">
                        <span className="pie-legend-sq" style={{background:d.color,borderRadius:2}}/>
                        <span style={{flex:1}}>{d.label}</span>
                        <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",fontWeight:500,color:"var(--ink)",marginRight:4}}>{fmt(d.value)}</span>
                        <span style={{color:"var(--muted)"}}>{totalMerc>0?Math.round((d.value/totalMerc)*100):0}%</span>
                      </div>
                    ))}
                    <div style={{borderTop:"0.5px solid var(--border)",paddingTop:7,marginTop:6,display:"flex",flexDirection:"column",gap:3}}>
                      {totalPieRV>0&&<div className="pie-legend-item">
                        <span className="pie-legend-sq" style={{background:"#1D9E75",opacity:.5}}/>
                        <span style={{flex:1,color:"var(--ink)",fontWeight:500}}>RV total</span>
                        <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",fontWeight:500,color:"var(--ink)"}}>{fmt(totalPieRV)}</span>
                      </div>}
                      {totalPieRF>0&&<div className="pie-legend-item">
                        <span className="pie-legend-sq" style={{background:"#0C7B8A",opacity:.5}}/>
                        <span style={{flex:1,color:"var(--ink)",fontWeight:500}}>RF total</span>
                        <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",fontWeight:500,color:"var(--ink)"}}>{fmt(totalPieRF)}</span>
                      </div>}
                    </div>
                  </div>
                </div>
            }
          </Panel>

          <Panel icon="📊" iconBg="#E1F5EE" title="Rendimiento por activo">
            {S.acts.map(a=>{
              const {bruto,pct,coste}=calcActivoBeneficio(a);
              const isActRF=esRF(a);
              const pos=bruto>=0;
              return (
                <div key={a.id} className="row">
                  <span className="dot" style={{background:TIPO_PIE_COLORS[a.tipo]||"#888780"}}/>
                  <div className="row-info">
                    <div className="row-name">{a.nombre}</div>
                    <div className={`row-sub${privacy?" privacy-blur":""}`}>
                      {fmt(coste)} {isActRF?"capital":"invertido"}
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",fontSize:12,fontWeight:500,color:pos?"#1D9E75":"#D85A30"}}>
                      {pos?"+":""}{fmt(bruto)}
                    </div>
                    <div style={{fontSize:10,color:pos?"#1D9E75":"#D85A30"}}>{pos?"+":""}{fmtN(pct)}%</div>
                  </div>
                </div>
              );
            })}
            {S.acts.length===0&&<div className="empty">Sin activos</div>}
          </Panel>
        </div>

        {/* Detalle por activo */}
        <Panel icon="📈" iconBg="#E1F5EE" title="Cartera de activos"
          action={
            <div style={{display:"flex",gap:6}}>
              <button className="btn-add" onClick={()=>{setFAp(p=>({...p,aid:S.acts[0]?.id||""}));setMAport(true);}}><I.Plus/> Aportación</button>
              <button className="btn-add" onClick={()=>setMActivo(true)}><I.Plus/> Activo</button>
            </div>
          }>
          {S.acts.length===0&&<div className="empty">Sin activos registrados</div>}
          {S.acts.map(a=>{
            const isActRF = esRF(a);
            const col = TIPO_COLORES[a.tipo]||{bg:"#F1EFE8",text:"#888780"};

            if(isActRF) {
              const capital   = calcRF_Capital(a);
              const intereses = calcRF_Intereses(a);
              const saldoT    = calcRF_SaldoTotal(a);
              const {pct}     = calcRF_Rentabilidad(a);
              const nAport    = (a.aportaciones||[]).length;
              const nInter    = (a.intereses||[]).length;
              return (
                <div key={a.id} className="inv-card">
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:"var(--ink)"}}>{a.nombre}</div>
                      <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>
                        {nAport>0?`${nAport} aportación${nAport!==1?"es":""}`:"Sin aportaciones adicionales"}
                        {nInter>0&&` · ${nInter} interés${nInter!==1?"es":""}`}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span className="tag" style={{background:col.bg,color:col.text}}>{a.tipo}</span>
                      <span className="tag" style={{background:"#E0F5F7",color:"#0C7B8A"}}>RF</span>
                      <button className="btn-icon" onClick={()=>deleteActivo(a.id)}>×</button>
                    </div>
                  </div>

                  <div style={{background:"var(--bg-soft)",borderRadius:8,padding:"10px 12px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,color:"var(--muted)"}}>Saldo total</span>
                    <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",fontSize:18,fontWeight:500,color:"#0C7B8A"}}>{fmt(saldoT)}</span>
                  </div>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                    <div style={{background:"var(--bg-soft)",borderRadius:8,padding:"10px 12px",borderLeft:"3px solid #185FA5"}}>
                      <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",color:"#185FA5",marginBottom:6}}>Tu capital</div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--muted)",marginBottom:3}}>
                        <span>Capital inicial</span>
                        <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",color:"var(--ink)"}}>{fmt(a.capitalInicial||0)}</span>
                      </div>
                      {(a.aportaciones||[]).length>0&&(
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--muted)",marginBottom:3}}>
                          <span>Aportaciones</span>
                          <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",color:"var(--ink)"}}>{fmt((a.aportaciones||[]).reduce((s,x)=>s+x.importe,0))}</span>
                        </div>
                      )}
                      <div style={{borderTop:"0.5px solid var(--border)",marginTop:4,paddingTop:4,display:"flex",justifyContent:"space-between",fontSize:11}}>
                        <span style={{fontWeight:500,color:"var(--ink)"}}>Total capital</span>
                        <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",fontWeight:500,color:"#185FA5"}}>{fmt(capital)}</span>
                      </div>
                    </div>

                    <div style={{background:"var(--bg-soft)",borderRadius:8,padding:"10px 12px",borderLeft:"3px solid #0C7B8A"}}>
                      <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",color:"#0C7B8A",marginBottom:6}}>Rendimientos</div>
                      {(a.interesesAcumuladosIniciales||0)>0&&(
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--muted)",marginBottom:3}}>
                          <span>Anteriores</span>
                          <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",color:"var(--ink)"}}>{fmt(a.interesesAcumuladosIniciales)}</span>
                        </div>
                      )}
                      {(a.intereses||[]).length>0&&(
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--muted)",marginBottom:3}}>
                          <span>Registrados</span>
                          <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",color:"var(--ink)"}}>{fmt((a.intereses||[]).reduce((s,x)=>s+x.importe,0))}</span>
                        </div>
                      )}
                      <div style={{borderTop:"0.5px solid var(--border)",marginTop:4,paddingTop:4,display:"flex",justifyContent:"space-between",fontSize:11}}>
                        <span style={{fontWeight:500,color:"var(--ink)"}}>Total intereses</span>
                        <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",fontWeight:500,color:"#0C7B8A"}}>{fmt(intereses)}</span>
                      </div>
                      <div style={{fontSize:11,color:"#0C7B8A",marginTop:5,textAlign:"right",fontWeight:500}}>
                        Rentabilidad: {fmtN(pct)}%
                      </div>
                    </div>
                  </div>

                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button className="btn-small" style={{color:"#0C7B8A",borderColor:"#0C7B8A"}}
                      onClick={()=>{setFInt(f=>({...f,aid:a.id}));setMInteres(true);}}>
                      + Añadir interés cobrado
                    </button>
                    <button className="btn-small"
                      onClick={()=>{setFAp(p=>({...p,aid:a.id}));setMAport(true);}}>
                      + Aportación de capital
                    </button>
                  </div>

                  {(a.intereses||[]).length>0&&(
                    <div style={{marginTop:12,borderTop:"0.5px solid var(--border)",paddingTop:10}}>
                      <div style={{fontSize:9,color:"#0C7B8A",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>Últimos intereses</div>
                      {(a.intereses||[]).slice(-4).map((it,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:"var(--muted)",marginBottom:3}}>
                          <span>{it.fecha}{it.desc&&<span style={{marginLeft:5,fontSize:10}}>· {it.desc}</span>}</span>
                          <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",fontWeight:500,color:"#0C7B8A"}}>+{fmt(it.importe)}</span>
                        </div>
                      ))}
                      {(a.intereses||[]).length>4&&<div style={{fontSize:10,color:"var(--muted)"}}>+{(a.intereses||[]).length-4} anteriores</div>}
                    </div>
                  )}
                </div>
              );
            }

            /* ── RV card ── */
            const cb = calcCosteBase(a);
            const {bruto,pct} = calcBeneficio(a);
            const pos = bruto>=0;
            return (
              <div key={a.id} className="inv-card">
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:"var(--ink)"}}>{a.nombre}</div>
                    {(()=>{
                      const nAp=(a.aportaciones||[]).filter(ap=>!ap.esPatrimonioPreexistente&&!ap.esInteres).length;
                      const hasVI=(a.valorInicial||0)>0;
                      const parts=[];
                      if(nAp>0) parts.push(nAp+' aportaci'+(nAp!==1?'ones':'ón'));
                      if(hasVI) parts.push('patrimonio preexistente');
                      return <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{parts.length>0?parts.join(' · '):'Sin movimientos'}</div>;
                    })()}
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span className="tag" style={{background:col.bg,color:col.text}}>{a.tipo}</span>
                    <span className="tag" style={{background:"#E1F5EE",color:"#0F6E56"}}>RV</span>
                    <button className="btn-icon" onClick={()=>deleteActivo(a.id)}>×</button>
                  </div>
                </div>

                <div className="inv-metrics">
                  {[
                    {l:"Capital",       v:fmt(cb),                      c:"var(--ink)"},
                    {l:"Valor mercado", v:fmt(a.valorMercado),          c:"var(--ink)"},
                    {l:"Plusvalía",     v:`${pos?"+":""}${fmt(bruto)}`, c:pos?"#1D9E75":"#D85A30"},
                    {l:"Rendimiento",   v:`${pos?"+":""}${fmtN(pct)}%`, c:pos?"#1D9E75":"#D85A30"},
                  ].map(m=>(
                    <div key={m.l}>
                      <div className={`inv-metric-val${privacy&&m.l!=="Rendimiento"?" privacy-blur":""}`} style={{color:m.c}}>{m.v}</div>
                      <div className="inv-metric-lbl">{m.l}</div>
                    </div>
                  ))}
                </div>

                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"var(--muted)",marginBottom:3}}>
                    <span>Coste base</span><span>Valor mercado</span>
                  </div>
                  <div style={{height:5,background:"var(--bg-soft)",borderRadius:3,overflow:"hidden",position:"relative"}}>
                    <div style={{position:"absolute",inset:0,width:`${Math.min(100,(cb/Math.max(a.valorMercado,cb,1))*100)}%`,background:"#185FA5",borderRadius:3}}/>
                    <div style={{position:"absolute",inset:0,left:`${Math.min(100,(cb/Math.max(a.valorMercado,cb,1))*100)}%`,background:pos?"#1D9E75":"#D85A30",borderRadius:"0 3px 3px 0"}}/>
                  </div>
                </div>

                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button className="btn-small" onClick={()=>{setMValor(a.id);setFVm(String(a.valorMercado));}}>Actualizar valor de mercado</button>
                  <button className="btn-small" style={{color:"#1D9E75",borderColor:"#1D9E75"}} onClick={()=>{setFInt(f=>({...f,aid:a.id}));setMInteres(true);}}>+ Dividendo/Interés</button>
                </div>

                {(a.aportaciones||[]).length>0&&(
                  <div style={{marginTop:12,borderTop:"0.5px solid var(--border)",paddingTop:10}}>
                    <div style={{fontSize:9,color:"var(--muted)",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>Historial</div>
                    {(a.aportaciones||[]).slice(-4).map((ap,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:"var(--muted)",marginBottom:3}}>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          <span>{ap.fecha}</span>
                          {ap.esPatrimonioPreexistente&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:10,background:"#EEEDFE",color:"#534AB7",fontWeight:600}}>PREEXISTENTE</span>}
                          {ap.esInteres&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:10,background:"#E1F5EE",color:"#0F6E56",fontWeight:600}}>DIVIDENDO</span>}
                        </div>
                        <span className={privacy?"privacy-blur":""} style={{fontFamily:"var(--font-mono)",fontWeight:500,color:ap.esPatrimonioPreexistente?"#534AB7":ap.esInteres?"#1D9E75":"var(--ink)"}}>{fmt(ap.importe)}</span>
                      </div>
                    ))}
                    {(a.aportaciones||[]).length>4&&<div style={{fontSize:10,color:"var(--muted)"}}>+{(a.aportaciones||[]).length-4} anteriores</div>}
                  </div>
                )}
              </div>
            );
          })}
        </Panel>
      </>
    );
  }

  /* ════════════════════════════
     TAB: AJUSTES
  ════════════════════════════ */

          finanz<em>io</em><sup>v8</sup>

        {fV.esIngreso&&(
          <div className="info-note" style={{borderLeft:"3px solid #1D9E75"}}>
            Los <strong>ingresos extra</strong> (ventas, bonus, devoluciones…) <strong>suman al saldo disponible</strong> en lugar de restarlo. No cuentan como gasto.
          </div>

        <Field label="Descripción">
          <input className="field-input" value={fV.desc} onChange={e=>setFV(f=>({...f,desc:e.target.value}))}

        </Field>
        <div className="field-row">
          <Field label="Importe (€)">
            <input className="field-input" type="number" value={fV.importe} onChange={e=>setFV(f=>({...f,importe:e.target.value}))} placeholder="42.50"/>
          </Field>
          <Field label="Fecha">
            <input className="field-input" type="date" value={fV.fecha} onChange={e=>setFV(f=>({...f,fecha:e.target.value}))}/>
          </Field>
        </div>

        {!fV.esIngreso&&(
          <Field label="Categoría">
            {!fV.useNewCat
              ? <div>
                  <select className="field-input" value={fV.cat} onChange={e=>setFV(f=>({...f,cat:e.target.value}))}>
                    {allCats.map(o=><option key={o}>{o}</option>)}
                  </select>
                  <button style={{marginTop:6,fontSize:11,color:"#185FA5",background:"none",border:"none",cursor:"pointer",fontFamily:"var(--font-body)"}}
                    onClick={()=>setFV(f=>({...f,useNewCat:true,newCat:""}))}>+ Crear categoría nueva</button>
                </div>
              : <div>
                  <input className="field-input" value={fV.newCat} onChange={e=>setFV(f=>({...f,newCat:e.target.value}))} placeholder="Nombre de la nueva categoría" autoFocus/>
                  <button style={{marginTop:6,fontSize:11,color:"var(--muted)",background:"none",border:"none",cursor:"pointer",fontFamily:"var(--font-body)"}}
                    onClick={()=>setFV(f=>({...f,useNewCat:false}))}>← Usar categoría existente</button>
                </div>
            }
          </Field>
        )}

        {/* Preview del efecto */}
        {fV.importe&&+fV.importe>0&&(
          <div className="preview-box" style={{background:fV.esIngreso?"#E1F5EE":"var(--bg-soft)"}}>
            <span style={{color:"var(--muted)"}}>Saldo tras registrar</span>
            <span style={{fontFamily:"var(--font-mono)",fontWeight:500,color:fV.esIngreso?"#0F6E56":saldo-+fV.importe<0?"#D85A30":"var(--ink)"}}>
              {fmt(fV.esIngreso ? saldo + +fV.importe : saldo - +fV.importe)}
            </span>
          </div>
        )}

        <div className="modal-actions">
          <button className="btn-cancel" onClick={()=>{setMVar(false);setFV({desc:"",importe:"",fecha:today(),cat:"Ocio",newCat:"",useNewCat:false,esIngreso:false});}}>Cancelar</button>
          <button className="btn-primary"
            style={{background:fV.esIngreso?"#1D9E75":"var(--green)"}}
            onClick={addVar}>
            {fV.esIngreso?"↑ Registrar ingreso":"Guardar gasto"}
          </button>
        </div>
      </Modal>

      {/* Editar gasto variable */}
      <Modal open={!!mEditVar} onClose={()=>setMEditVar(null)} title="Editar gasto">
        {mEditVar&&(<>
          <Field label="Descripción"><input className="field-input" value={mEditVar.desc} onChange={e=>setMEditVar(f=>({...f,desc:e.target.value}))}/></Field>
          <div className="field-row">
            <Field label="Importe (€)"><input className="field-input" type="number" value={mEditVar.importe} onChange={e=>setMEditVar(f=>({...f,importe:e.target.value}))}/></Field>
            <Field label="Fecha"><input className="field-input" type="date" value={mEditVar.fecha} onChange={e=>setMEditVar(f=>({...f,fecha:e.target.value}))}/></Field>
          </div>
          <Field label="Categoría">
            <select className="field-input" value={mEditVar.cat} onChange={e=>setMEditVar(f=>({...f,cat:e.target.value}))}>
              {allCats.map(o=><option key={o}>{o}</option>)}
            </select>
          </Field>
          <div className="modal-actions">
            <button className="btn-cancel" onClick={()=>setMEditVar(null)}>Cancelar</button>
            <button className="btn-primary" onClick={saveVar}>Guardar cambios</button>
          </div>
        </>)}
      </Modal>

      {/* Nuevo activo */}
      <Modal open={mActivo} onClose={()=>setMActivo(false)} title="Nuevo activo">
        <Field label="Nombre">
          <input className="field-input" value={fA.nombre} onChange={e=>setFA(f=>({...f,nombre:e.target.value}))} placeholder="Ej: ETF S&P 500 · Cuenta Naranja"/>
        </Field>
        <Field label="Tipo de activo">
          <select className="field-input" value={fA.tipo} onChange={e=>setFA(f=>({...f,tipo:e.target.value}))}>
            <optgroup label="── Renta Variable ──">
              {RV_TIPOS.map(o=><option key={o} value={o}>{o}</option>)}
            </optgroup>
            <optgroup label="── Renta Fija / Efectivo ──">
              {RF_TIPOS.map(o=><option key={o} value={o}>{o}</option>)}
            </optgroup>
          </select>
        </Field>

        {TIPO_FAMILIA[fA.tipo]==="RF" ? (
          <>
            <div className="info-note" style={{borderLeft:"3px solid #0C7B8A"}}>
              Para activos de <strong>Renta Fija</strong> (cuentas remuneradas, bonos, P2P…) no hay precio de mercado: el valor siempre es <strong>Capital + Intereses acumulados</strong>.
            </div>
            <div className="field-row">
              <Field label="Capital inicial (€)">
                <input className="field-input" type="number" value={fA.capitalInicial||""} onChange={e=>setFA(f=>({...f,capitalInicial:e.target.value}))} placeholder="5000"/>
              </Field>
              <Field label="Intereses ya cobrados (€)">
                <input className="field-input" type="number" value={fA.interesesAcumuladosIniciales||""} onChange={e=>setFA(f=>({...f,interesesAcumuladosIniciales:e.target.value}))} placeholder="0"/>
              </Field>
            </div>
            {(+fA.capitalInicial>0||+fA.interesesAcumuladosIniciales>0)&&(
              <div className="preview-grid" style={{marginBottom:14}}>
                <div>
                  <div style={{fontFamily:"var(--font-mono)",fontWeight:500,fontSize:13,color:"#185FA5"}}>{fmt(+fA.capitalInicial||0)}</div>
                  <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>CAPITAL</div>
                </div>
                <div>
                  <div style={{fontFamily:"var(--font-mono)",fontWeight:500,fontSize:13,color:"#0C7B8A"}}>{fmt((+fA.capitalInicial||0)+(+fA.interesesAcumuladosIniciales||0))}</div>
                  <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>SALDO TOTAL</div>
                </div>
              </div>
            )}
          </>
        ) : (
          <>
            <div className="field-row">
              <Field label="Valor de mercado actual (€)">
                <input className="field-input" type="number" value={fA.valorMercado} onChange={e=>setFA(f=>({...f,valorMercado:e.target.value}))} placeholder="1250"/>
              </Field>
              <Field label="Valor inicial preexistente (€)">
                <input className="field-input" type="number" value={fA.valorInicial} onChange={e=>setFA(f=>({...f,valorInicial:e.target.value}))} placeholder="0"/>
              </Field>
            </div>
            <div className="info-note" style={{borderLeft:"3px solid #534AB7"}}>
              El <strong>valor preexistente</strong> es patrimonio que ya tenías antes de usar Finanzio. Se suma al capital pero <strong>no genera ningún gasto</strong>.
            </div>
            {(+fA.valorInicial>0||+fA.valorMercado>0)&&(
              <div className="preview-grid" style={{marginBottom:14}}>
                <div>
                  <div style={{fontFamily:"var(--font-mono)",fontWeight:500,fontSize:13,color:"var(--ink)"}}>{fmt((+fA.valorMercado||0)+(+fA.valorInicial||0))}</div>
                  <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>VALOR TOTAL</div>
                </div>
                <div>
                  <div style={{fontFamily:"var(--font-mono)",fontWeight:500,fontSize:13,color:"#534AB7"}}>{fmt(+fA.valorInicial||0)}</div>
                  <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>PREEXISTENTE</div>
                </div>
              </div>
            )}
          </>
        )}
        <div className="modal-actions">
          <button className="btn-cancel" onClick={()=>setMActivo(false)}>Cancelar</button>
          <button className="btn-primary" onClick={addActivo}>Guardar</button>
        </div>
      </Modal>

      {/* Actualizar valor mercado */}
      <Modal open={mValor!==null} onClose={()=>setMValor(null)} title="Valor de mercado actual">
        <div className="info-note" style={{borderLeft:"3px solid #185FA5"}}>
          Introduce el precio actual. Se calculará el <strong>beneficio bruto</strong> y el <strong>rendimiento (%)</strong> automáticamente.
        </div>
        <Field label="Nuevo valor de mercado (€)">
          <input className="field-input" type="number" value={fVm} onChange={e=>setFVm(e.target.value)} placeholder="Ej: 4850" autoFocus/>
        </Field>
        {fVm&&!isNaN(+fVm)&&mValor&&(()=>{
          const a=S.acts.find(x=>x.id===mValor);if(!a) return null;
          const cb=calcCosteBase(a), bruto=r2(+fVm-cb), pct=cb>0?r2((bruto/cb)*100):0;
          return(
            <div className="preview-grid">
              <div>
                <div style={{fontFamily:"var(--font-mono)",fontSize:15,fontWeight:500,color:bruto>=0?"#1D9E75":"#D85A30"}}>{bruto>=0?"+":""}{fmt(bruto)}</div>
                <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>Beneficio bruto</div>
              </div>
              <div>
                <div style={{fontFamily:"var(--font-mono)",fontSize:15,fontWeight:500,color:pct>=0?"#1D9E75":"#D85A30"}}>{pct>=0?"+":""}{fmtN(pct)}%</div>
                <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>Rendimiento</div>
              </div>
            </div>
          );
        })()}
        <div className="modal-actions">
          <button className="btn-cancel" onClick={()=>setMValor(null)}>Cancelar</button>
          <button className="btn-primary" onClick={updateValorMercado}>Actualizar</button>
        </div>
      </Modal>

      {/* Aportación */}
      <Modal open={mAport} onClose={()=>setMAport(false)} title="Registrar aportación">
        <div className="info-note" style={{borderLeft:"3px solid #534AB7"}}>
          Esta operación <strong>resta del saldo</strong>, suma al capital del activo y genera un registro en <strong>Variables → Inversión</strong>.
        </div>
        <Field label="Activo destino">
          <select className="field-input" value={fAp.aid} onChange={e=>setFAp(f=>({...f,aid:e.target.value}))}>
            <option value="">— Selecciona activo —</option>
            {S.acts.map(a=><option key={a.id} value={a.id}>{a.nombre}</option>)}
          </select>
        </Field>
        <div className="field-row">
          <Field label="Importe (€)"><input className="field-input" type="number" value={fAp.importe} onChange={e=>setFAp(f=>({...f,importe:e.target.value}))} placeholder="500"/></Field>
          <Field label="Fecha"><input className="field-input" type="date" value={fAp.fecha} onChange={e=>setFAp(f=>({...f,fecha:e.target.value}))}/></Field>
        </div>
        <div className="preview-box" style={{background:"var(--bg-soft)"}}>
          <span style={{color:"var(--muted)"}}>Saldo actual</span>
          <span style={{fontFamily:"var(--font-mono)",fontWeight:500,color:"#1D9E75"}}>{fmt(saldo)}</span>
        </div>
        {fAp.importe&&+fAp.importe>0&&(
          <div className="preview-box" style={{background:+fAp.importe>saldo?"#FAECE7":"#E1F5EE"}}>
            <span style={{color:"var(--muted)"}}>Saldo tras aportación</span>
            <span style={{fontFamily:"var(--font-mono)",fontWeight:500,color:+fAp.importe>saldo?"#D85A30":"#1D9E75"}}>{fmt(saldo-+fAp.importe)}</span>
          </div>
        )}
        <div className="modal-actions">
          <button className="btn-cancel" onClick={()=>setMAport(false)}>Cancelar</button>
          <button className="btn-primary" style={{background:"#534AB7"}} onClick={addAportacion}>Transferir →</button>
        </div>
      </Modal>

      {/* Interés / Rendimiento */}
      <Modal open={mInteres} onClose={()=>setMInteres(false)} title="Registrar interés / rendimiento">
        <div className="info-note" style={{borderLeft:"3px solid #0C7B8A"}}>
          <strong>Renta pasiva:</strong> dinero generado por el propio activo (intereses, dividendos, cupones…).
          <strong> No resta del saldo mensual</strong> — solo aumenta el valor y el rendimiento del activo. ✓
        </div>
        <Field label="Activo">
          <select className="field-input" value={fInt.aid} onChange={e=>setFInt(f=>({...f,aid:e.target.value}))}>
            <option value="">— Selecciona activo —</option>
            {S.acts.map(a=><option key={a.id} value={a.id}>{a.nombre} ({TIPO_FAMILIA[a.tipo]==="RF"?"RF":"RV"})</option>)}
          </select>
        </Field>
        <div className="field-row">
          <Field label="Importe (€)"><input className="field-input" type="number" value={fInt.importe} onChange={e=>setFInt(f=>({...f,importe:e.target.value}))} placeholder="12.50"/></Field>
          <Field label="Fecha"><input className="field-input" type="date" value={fInt.fecha} onChange={e=>setFInt(f=>({...f,fecha:e.target.value}))}/></Field>
        </div>
        <Field label="Descripción (opcional)">
          <input className="field-input" value={fInt.desc} onChange={e=>setFInt(f=>({...f,desc:e.target.value}))} placeholder="Ej: Interés mensual 3%, Dividendo Q1…"/>
        </Field>
        {fInt.aid&&+fInt.importe>0&&(()=>{
          const act=S.acts.find(a=>a.id===fInt.aid);
          if(!act) return null;
          const isActRF=esRF(act);
          const saldoNuevo = isActRF
            ? r2(calcRF_SaldoTotal(act)+(+fInt.importe))
            : r2(act.valorMercado+(+fInt.importe));
          const capActual  = isActRF ? calcRF_Capital(act) : calcCosteBase(act);
          const intNuevos  = isActRF
            ? r2(calcRF_Intereses(act)+(+fInt.importe))
            : r2((act.aportaciones||[]).filter(ap=>ap.esInteres).reduce((s,x)=>s+x.importe,0)+(+fInt.importe));
          const pctNuevo   = capActual>0?r2((intNuevos/capActual)*100):0;
          return(
            <div className="preview-grid">
              <div>
                <div style={{fontFamily:"var(--font-mono)",fontSize:14,fontWeight:500,color:"#0C7B8A"}}>{fmt(saldoNuevo)}</div>
                <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>{isActRF?"Nuevo saldo total":"Nuevo valor"}</div>
              </div>
              <div>
                <div style={{fontFamily:"var(--font-mono)",fontSize:14,fontWeight:500,color:"#1D9E75"}}>+{fmtN(pctNuevo)}%</div>
                <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>Rendimiento acumulado</div>
              </div>
            </div>
          );
        })()}
        <div className="modal-actions">
          <button className="btn-cancel" onClick={()=>setMInteres(false)}>Cancelar</button>
          <button className="btn-primary" style={{background:"#0C7B8A"}} onClick={addInteres}>Añadir rendimiento ↑</button>
        </div>
      </Modal>

      {/* Editar ingresos */}
      <Modal open={mIngresos} onClose={()=>setMIngresos(false)} title="Ingreso mensual">
        <Field label="Salario neto mensual (€)">
          <input className="field-input" type="number" value={fIng||S.ingresos} onChange={e=>setFIng(e.target.value)} placeholder={String(S.ingresos)}/>
        </Field>
        <div className="modal-actions">
          <button className="btn-cancel" onClick={()=>setMIngresos(false)}>Cancelar</button>
          <button className="btn-primary" onClick={updateIngresos}>Guardar</button>
        </div>
      </Modal>

      {/* Editar inversión planificada */}
      <Modal open={mMargen} onClose={()=>setMMargen(false)} title="Inversión planificada mensual">
        <div className="info-note" style={{borderLeft:"3px solid #534AB7"}}>
          Fija cuánto planeas invertir este mes. Este valor se resta de tus ingresos para calcular el <strong>Disponible para Variables</strong>.
        </div>
        <Field label="Inversión planificada (€)">
          <input className="field-input" type="number" value={fMar||S.invPlanificadas||0} onChange={e=>setFMar(e.target.value)} placeholder="500" autoFocus/>
        </Field>
        <div className="modal-actions">
          <button className="btn-cancel" onClick={()=>setMMargen(false)}>Cancelar</button>
          <button className="btn-primary" onClick={updateMargen}>Guardar</button>
        </div>
      </Modal>

      {/* ════ V8: Modal Ajustar Saldo Real ════ */}
      <Modal open={mAjusteSaldo} onClose={()=>setMAjusteSaldo(false)} title="Ajustar Saldo Real">
        <div className="info-note" style={{borderLeft:"3px solid #185FA5"}}>
          Introduce el saldo actual de tu banco. La app calculará la diferencia con el saldo calculado y ajustará el disponible para que <strong>coincida exactamente con la realidad</strong>.
        </div>
        <div className="preview-grid" style={{marginBottom:14}}>
          <div>
            <div style={{fontFamily:"var(--font-mono)",fontSize:15,fontWeight:500,color:"#1D9E75"}}>{fmt(saldo)}</div>
            <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>Saldo calculado por app</div>
          </div>
          <div>
            <div style={{fontFamily:"var(--font-mono)",fontSize:15,fontWeight:500,color:(S.ajusteSaldo||0)!==0?"#185FA5":"var(--muted)"}}>
              {(S.ajusteSaldo||0)!==0?`${(S.ajusteSaldo||0)>0?"+":""}${fmt(S.ajusteSaldo)}`:"Sin ajuste"}
            </div>
            <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>Ajuste actual</div>
          </div>
        </div>
        <Field label="Saldo real en el banco (€)">
          <input className="field-input" type="number" value={fSaldoReal} onChange={e=>setFSaldoReal(e.target.value)}
            placeholder={fmt(saldo).replace(/[^\d,-]/g,"")} autoFocus/>
        </Field>
        {fSaldoReal&&!isNaN(+fSaldoReal)&&(()=>{
          const diferencia = r2(+fSaldoReal - saldo);
          return (
            <div className="preview-box" style={{background:diferencia===0?"var(--bg-soft)":diferencia>0?"#E1F5EE":"#FAECE7"}}>
              <span style={{color:"var(--muted)"}}>Diferencia a aplicar</span>
              <span style={{fontFamily:"var(--font-mono)",fontWeight:500,color:diferencia===0?"var(--muted)":diferencia>0?"#0F6E56":"#993C1D"}}>
                {diferencia===0?"Sin cambios":`${diferencia>0?"+":""}${fmt(diferencia)}`}
              </span>
            </div>
          );
        })()}
        <div className="modal-actions">
          <button className="btn-cancel" onClick={()=>setMAjusteSaldo(false)}>Cancelar</button>
          <button className="btn-primary" style={{background:"#185FA5"}} onClick={ajustarSaldoReal}>
            ⚖ Sincronizar con banco
          </button>
        </div>
      </Modal>

      {/* Nuevo estimado */}
      <Modal open={mAddEst} onClose={()=>setMAddEst(false)} title="Nuevo gasto estimado">
        <div className="info-note" style={{borderLeft:"3px solid #185FA5"}}>
          Compara un presupuesto con el gasto real para partidas semi-variables.
        </div>
        <Field label="Nombre"><input className="field-input" value={fEst.nombre} onChange={e=>setFEst(f=>({...f,nombre:e.target.value}))} placeholder="Ej: Comida diaria"/></Field>
        <div className="field-row">
          <Field label="Presupuesto (€)"><input className="field-input" type="number" value={fEst.presupuesto} onChange={e=>setFEst(f=>({...f,presupuesto:e.target.value}))} placeholder="200"/></Field>
          <Field label="Gasto real (€)"><input className="field-input" type="number" value={fEst.real} onChange={e=>setFEst(f=>({...f,real:e.target.value}))} placeholder="0"/></Field>
        </div>
        <Field label="Categoría">
          <select className="field-input" value={fEst.cat} onChange={e=>setFEst(f=>({...f,cat:e.target.value}))}>
            {allCats.map(o=><option key={o}>{o}</option>)}
          </select>
        </Field>
        <div className="modal-actions">
          <button className="btn-cancel" onClick={()=>setMAddEst(false)}>Cancelar</button>
          <button className="btn-primary" onClick={addEstimado}>Guardar</button>
        </div>
      </Modal>

      {/* Editar estimado */}
      <Modal open={!!mEditEst} onClose={()=>setMEditEst(null)} title="Editar gasto estimado">
        {mEditEst&&(<>
          <Field label="Nombre"><input className="field-input" value={mEditEst.nombre} onChange={e=>setMEditEst(f=>({...f,nombre:e.target.value}))}/></Field>
          <div className="field-row">
            <Field label="Presupuesto (€)"><input className="field-input" type="number" value={mEditEst.presupuesto} onChange={e=>setMEditEst(f=>({...f,presupuesto:e.target.value}))}/></Field>
            <Field label="Gasto real (€)"><input className="field-input" type="number" value={mEditEst.real} onChange={e=>setMEditEst(f=>({...f,real:e.target.value}))}/></Field>
          </div>
          <Field label="Categoría">
            <select className="field-input" value={mEditEst.cat} onChange={e=>setMEditEst(f=>({...f,cat:e.target.value}))}>
              {allCats.map(o=><option key={o}>{o}</option>)}
            </select>
          </Field>
          <div className="modal-actions">
            <button className="btn-cancel" onClick={()=>setMEditEst(null)}>Cancelar</button>
            <button className="btn-primary" onClick={saveEstimado}>Guardar cambios</button>
          </div>
        </>)}
      </Modal>

      {/* Editar límites */}
      <Modal open={mLimites} onClose={()=>setMLimites(false)} title="Límites de presupuesto">
        <div className="info-note" style={{borderLeft:"3px solid #1D9E75"}}>
          Ajusta el presupuesto mensual máximo de cada categoría.
        </div>
        <div style={{maxHeight:320,overflowY:"auto"}}>
          {allCats.filter(c=>S.lim[c]!=null).map(cat=>(
            <div key={cat} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"0.5px solid var(--border)",gap:12}}>
              <span className="dot" style={{background:catColor(cat)}}/>
              <span style={{flex:1,fontSize:13,color:"var(--ink)"}}>{cat}</span>
              <input className="lim-input" type="number" min="0"
                value={limEdit[cat]??S.lim[cat]??0}
                onChange={e=>setLimEdit(l=>({...l,[cat]:e.target.value}))}/>
              <span style={{fontSize:11,color:"var(--muted)"}}>€</span>
            </div>
          ))}
        </div>
        <div className="modal-actions">
          <button className="btn-cancel" onClick={()=>setMLimites(false)}>Cancelar</button>
          <button className="btn-primary" onClick={saveLimites}>Guardar límites</button>
        </div>
      </Modal>

      {/* Toast + Confirm */}
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      <Confirm open={!!confirm} title={confirm?.title} msg={confirm?.msg}
        confirmLabel={confirm?.confirmLabel} confirmColor={confirm?.confirmColor}
        onYes={confirm?.onYes} onNo={()=>setConfirm(null)}/>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
